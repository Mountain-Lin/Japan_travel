<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸☃️日本行程與預算管理☃️🌸</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇯🇵</text></svg>">
  
  <style>
    /* ================= 櫻花粉白系質感與風格設定 ================= */
    :root {
      --bg-color: #fcf6f7;
      --card-bg: #ffffff;
      --text-color: #4a4044;
      --text-muted: #8c7d82;
      --border-color: #f0d5dc;
      --accent-pink: #ff758c;
      --accent-pink-hover: #ff5270;
      --accent-purple: #8b5cf6;
      --accent-green: #2ecc71;
      --danger-color: #ff6b6b;
      --glow-shadow: 0 8px 25px rgba(255, 117, 140, 0.12);
      --card-shadow: 0 4px 15px rgba(220, 195, 202, 0.2);
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 10px;
      line-height: 1.5;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 5px;
    }

    /* 頂部控制面板 (固定置頂) - 手機版高度精簡 */
    .top-panel {
      position: sticky;
      top: 5px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 10px 15px;
      margin-bottom: 15px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(255, 117, 140, 0.15);
    }

    .budget-summary-container {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 200px;
    }

    .budget-summary-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .budget-summary {
      font-size: 1.1rem;
      font-weight: bold;
      color: #e65c7b;
      letter-spacing: 0.5px;
    }

    .toggle-details-btn {
      background: #fff0f3;
      color: #e65c7b;
      border: 1px solid #ffd1d5;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
      font-weight: 600;
    }
    .toggle-details-btn:hover {
      background: #ffe0e6;
    }

    /* 動態分類統計小標籤列 (預設隱藏，點擊才展開) */
    .category-breakdown {
      display: none;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 4px;
      padding-top: 6px;
      border-top: 1px dashed #f0d5dc;
    }
    .category-breakdown.show {
      display: flex;
    }

    .cat-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #fff0f3;
      color: #9c4d63;
      border: 1px solid #ffd1d5;
      padding: 2px 6px;
      border-radius: 5px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .cat-badge span {
      color: #e65c7b;
    }

    .control-group {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* 航班資訊面板樣式 */
    .flight-panel {
      background: #ffffff;
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 12px 15px;
      margin-bottom: 15px;
      box-shadow: var(--card-shadow);
    }

    .flight-panel-title {
      font-size: 1rem;
      font-weight: bold;
      color: #9c4d63;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #ffdbe3;
      padding-bottom: 6px;
      cursor: pointer;
    }

    .flight-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .flight-card {
      background: #faf5f6;
      border: 1px solid #f0d5dc;
      border-radius: 10px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .flight-card-header {
      font-weight: bold;
      font-size: 0.85rem;
      color: #b07d89;
    }

    .flight-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr 1.2fr;
      gap: 5px;
    }

    input, button, select, textarea {
      background: #faf5f6;
      color: var(--text-color);
      border: 1px solid var(--border-color);
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.2s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent-pink);
      box-shadow: 0 0 6px rgba(255, 117, 140, 0.3);
    }

    input[type="number"] {
      width: 75px;
    }

    button {
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .btn-primary { 
      background: linear-gradient(135deg, #ff758c, #ff7eb3); 
      color: white; 
      border: none; 
      box-shadow: 0 3px 8px rgba(255, 117, 140, 0.3);
    }
    .btn-primary:hover { background: linear-gradient(135deg, #ff5270, #ff639c); }

    .btn-danger { 
      background: #fff0f1; 
      color: var(--danger-color); 
      border: 1px solid #ffd1d5; 
      padding: 3px 8px;
      font-size: 0.75rem;
      border-radius: 6px;
    }
    .btn-danger:hover { background: var(--danger-color); color: white; }

    .btn-success { 
      background: linear-gradient(135deg, #2ecc71, #27ae60); 
      color: white; 
      border: none; 
      box-shadow: 0 3px 8px rgba(46, 204, 113, 0.3);
    }
    .btn-success:hover { background: linear-gradient(135deg, #27ae60, #1e8449); }

    /* 內建清除按鈕包裝容器 */
    .clearable-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
    }

    .clearable-input-wrapper input,
    .clearable-input-wrapper textarea,
    .clearable-input-wrapper select {
      width: 100%;
      padding-right: 24px;
    }

    .clear-btn {
      position: absolute;
      right: 6px;
      background: #e2d1d6;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0.6;
      transition: all 0.2s;
      padding: 0;
      line-height: 1;
      z-index: 10;
    }

    .clear-btn:hover {
      opacity: 1;
      background: var(--danger-color);
      transform: scale(1.1);
    }

    /* 三線拖曳按鈕樣式 */
    .drag-handle {
      cursor: grab;
      color: #b07d89;
      background: #f0e1e5;
      border: none;
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      letter-spacing: -2px;
    }

    /* PART 區塊樣式 */
    .part-section {
      background: #ffffff;
      border: 2px dashed #f0d5dc;
      border-radius: 14px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: var(--card-shadow);
    }

    .part-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      border-bottom: 2px solid #ffdbe3;
      padding-bottom: 10px;
      gap: 10px;
    }

    .part-title-input {
      font-size: 1.1rem;
      font-weight: bold;
      color: #9c4d63;
      border: 1px solid transparent;
      background: transparent;
      width: 60%;
    }
    .part-title-input:focus {
      background: #faf5f6;
      border-color: var(--accent-pink);
    }

    .part-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    /* Day 卡片樣式 */
    .day-card {
      background: #faf5f6;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(220, 195, 202, 0.1);
    }

    .day-header {
      background: linear-gradient(to right, #ffeef2, #faf5f6);
      padding: 10px 12px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 5px solid var(--accent-pink);
      border-bottom: 1px solid var(--border-color);
      gap: 8px;
      flex-wrap: wrap;
    }

    .day-input {
      background: transparent;
      border: 1px solid transparent;
      font-weight: bold;
      color: var(--text-color);
      font-size: 0.95rem;
      flex: 1;
      min-width: 150px;
    }
    .day-input:focus {
      background: white;
      border-color: var(--accent-pink);
    }

    .base-input {
      background: #ffffff;
      border: 1px solid #ffdbe3;
      font-size: 0.8rem;
      color: #9c6c77;
      padding: 3px 6px;
      border-radius: 5px;
      width: 130px;
    }

    /* 摺疊項目卡片設計 (Popup / Accordion 風格) */
    .item-card {
      background: #ffffff;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      margin: 8px;
      overflow: hidden;
      transition: all 0.2s;
    }

    .item-summary-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #ffffff;
      cursor: pointer;
      gap: 8px;
      user-select: none;
    }
    .item-summary-bar:hover {
      background: #fff8f9;
    }

    .item-summary-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      overflow: hidden;
    }

    .item-badge-tag {
      background: #fff0f3;
      color: #e65c7b;
      border: 1px solid #ffd1d5;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .item-summary-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-color);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-summary-right {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      font-weight: bold;
      color: #e0566d;
      white-space: nowrap;
    }

    .expand-arrow {
      color: #b07d89;
      font-size: 0.8rem;
      transition: transform 0.2s;
    }

    /* 展開後的詳細編輯內容區塊 */
    .item-details-content {
      display: none;
      padding: 10px 12px;
      background: #faf5f6;
      border-top: 1px solid var(--border-color);
      flex-direction: column;
      gap: 8px;
    }
    .item-card.expanded .item-details-content {
      display: flex;
    }
    .item-card.expanded .expand-arrow {
      transform: rotate(180deg);
    }

    .detail-grid-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .cell-input {
      background: #ffffff;
      border: 1px solid var(--border-color);
      width: 100%;
      padding: 6px;
      border-radius: 6px;
      color: var(--text-color);
      font-size: 0.85rem;
    }
    .cell-input:focus {
      border-color: var(--accent-pink);
    }

    select.cell-input {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238c7d82' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 6px center;
      background-size: 12px;
      padding-right: 20px;
    }

    /* 備註與超連結包裝區塊 */
    .note-container {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .note-preview-area {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .link-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #fff0f3;
      color: #e65c7b;
      border: 1px solid #ffd1d5;
      padding: 2px 6px;
      border-radius: 5px;
      font-size: 0.75rem;
      text-decoration: none;
      font-weight: 600;
      width: fit-content;
    }
    .link-badge:hover {
      background: #ffe0e6;
    }

    /* 費用輸入群組 */
    .cost-box {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .input-group {
      display: flex;
      align-items: center;
      background: #ffffff;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      overflow: hidden;
    }

    .curr-tag {
      padding: 3px 5px;
      font-size: 0.75rem;
      background: #f0e1e5;
      color: #7a686e;
    }

    .cost-input {
      border: none;
      background: transparent;
      padding: 4px;
      width: 65px;
      color: var(--text-color);
      font-size: 0.85rem;
    }

    .twd-val {
      color: #e0566d;
      font-weight: bold;
    }

    .add-row-container {
      padding: 8px;
      text-align: center;
      background: #ffffff;
    }

    .add-row-btn, .add-day-btn, .add-part-btn {
      background: #faf5f6;
      border: 1px dashed #e6b8c3;
      color: #b07d89;
      width: 100%;
      padding: 6px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .add-row-btn:hover, .add-day-btn:hover, .add-part-btn:hover {
      background: #fff0f3;
      border-color: var(--accent-pink);
      color: var(--accent-pink);
    }

    .global-actions {
      text-align: center;
      margin: 20px 0;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* 響應式手機優化調整 */
    @media (max-width: 768px) {
      .top-panel { padding: 10px 12px; }
      .flight-grid { grid-template-columns: 1fr; }
      .flight-inputs { grid-template-columns: 1fr; gap: 6px; }
      .detail-grid-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- 頂部控制面板 -->
  <div class="top-panel">
    <div class="budget-summary-container">
      <div class="budget-summary-row">
        <div class="budget-summary">
          🌸 總預算：<span id="grand-total-twd">NT$ 0</span>
        </div>
        <button class="toggle-details-btn" onclick="toggleCategoryBreakdown()">分類明細 ▾</button>
      </div>
      <!-- 點擊才展開的動態分類明細 -->
      <div id="category-breakdown" class="category-breakdown"></div>
    </div>
    <div class="control-group">
      <label style="font-size: 0.85rem; font-weight: 600;">匯率:</label>
      <div class="clearable-input-wrapper" style="width: 80px;">
        <input type="number" id="global-rate" value="0.22" step="0.01" oninput="recalculateAll()">
        <button class="clear-btn" onclick="clearInput(this)">×</button>
      </div>
      <button class="btn-primary" onclick="toggleAllItems(true)" style="padding: 6px 10px; font-size: 0.8rem;" title="一鍵全開">全開</button>
      <button class="btn-primary" onclick="toggleAllItems(false)" style="padding: 6px 10px; font-size: 0.8rem;" title="一鍵全收">全收</button>
      <button class="btn-success" onclick="saveDataToFirebase()" style="padding: 6px 10px; font-size: 0.8rem;">☁️ 同步</button>
      <button class="btn-danger" onclick="resetData()" style="padding: 6px 10px; font-size: 0.8rem;">重置</button>
    </div>
  </div>

  <!-- 航班與出國資訊面板 (可點標題折疊) -->
  <div class="flight-panel">
    <div class="flight-panel-title" onclick="toggleFlightPanel()">
      <span>✈️ 航班與出國資訊</span>
      <span id="flight-toggle-arrow" style="font-size: 0.8rem; color: #b07d89;">▾</span>
    </div>
    <div id="flight-content-grid" class="flight-grid" style="display: none;">
      <!-- 去程航班 -->
      <div class="flight-card">
        <div class="flight-card-header">🛫 去程航班</div>
        <div class="flight-inputs">
          <div class="clearable-input-wrapper"><input type="date" id="flight-out-date" placeholder="日期" /></div>
          <div class="clearable-input-wrapper"><input type="time" id="flight-out-time" placeholder="時間" /></div>
          <div class="clearable-input-wrapper"><input type="text" id="flight-out-no" placeholder="班機" /></div>
        </div>
      </div>
      <!-- 回程航班 -->
      <div class="flight-card">
        <div class="flight-card-header">🛬 回程航班</div>
        <div class="flight-inputs">
          <div class="clearable-input-wrapper"><input type="date" id="flight-in-date" placeholder="日期" /></div>
          <div class="clearable-input-wrapper"><input type="time" id="flight-in-time" placeholder="時間" /></div>
          <div class="clearable-input-wrapper"><input type="text" id="flight-in-no" placeholder="班機" /></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 行程容器 -->
  <div id="itinerary-container"></div>

  <!-- 全域新增按鈕 -->
  <div class="global-actions">
    <button class="btn-primary add-part-btn" onclick="addPart()" style="padding: 8px 16px; border-radius: 8px; width: auto; font-size: 0.85rem;">➕ 新增區塊 (PART)</button>
  </div>

</div>

<script>
  let tripData = {
    rate: 0.22,
    flight: {
      outDate: "12/01", outTime: "08:30", outNo: "JX820",
      inDate: "12/05", inTime: "15:45", inNo: "JX821"
    },
    parts: {
      part1: {
        title: "PART 1：北海道極光與玩雪篇",
        days: {
          day1: {
            title: "Day 1 抵達與市區漫步",
            base: "札幌車站周邊",
            items: {
              item1: { type: "交通", detail: "機場快線車票", jpy: 1150, twd: 253, note: "https://maps.app.goo.gl/example" }
            }
          }
        }
      }
    }
  };

  const categories = ["固定", "交通", "住宿", "飲食", "遊玩", "購物"];

  function getRate() {
    const val = parseFloat(document.getElementById('global-rate').value);
    return isNaN(val) || val <= 0 ? 0.22 : val;
  }

  function toggleCategoryBreakdown() {
    const el = document.getElementById('category-breakdown');
    el.classList.toggle('show');
  }

  function toggleFlightPanel() {
    const grid = document.getElementById('flight-content-grid');
    const arrow = document.getElementById('flight-toggle-arrow');
    if (grid.style.display === 'none') {
      grid.style.display = 'grid';
      arrow.style.transform = 'rotate(180deg)';
    } else {
      grid.style.display = 'none';
      arrow.style.transform = 'rotate(0deg)';
    }
  }

  function toggleItemCard(headerEl) {
    const card = headerEl.closest('.item-card');
    card.classList.toggle('expanded');
  }

  function toggleAllItems(expand) {
    document.querySelectorAll('.item-card').forEach(card => {
      if (expand) {
        card.classList.add('expanded');
      } else {
        card.classList.remove('expanded');
      }
    });
  }

  function wrapClearable(type, className, value, placeholder = '', rows = 1) {
    if (type === 'textarea') {
      return `
        <div class="clearable-input-wrapper">
          <textarea class="${className}" placeholder="${placeholder}" rows="${rows}" oninput="updateItemSummary(this); updateNotePreview(this);">${value || ''}</textarea>
          <button class="clear-btn" onclick="clearInput(this)">×</button>
        </div>
      `;
    } else {
      return `
        <div class="clearable-input-wrapper">
          <input type="${type}" class="${className}" value="${value !== undefined ? value : ''}" placeholder="${placeholder}" oninput="updateItemSummary(this)">
          <button class="clear-btn" onclick="clearInput(this)">×</button>
        </div>
      `;
    }
  }

  function renderCategorySelect(selectedValue) {
    let optionsHtml = `<option value="" disabled ${!selectedValue ? 'selected' : ''}>類別</option>`;
    let isCustom = selectedValue && !categories.includes(selectedValue);

    categories.forEach(cat => {
      const isSelected = (cat === selectedValue) ? 'selected' : '';
      optionsHtml += `<option value="${cat}" ${isSelected}>${cat}</option>`;
    });

    if (isCustom) {
      optionsHtml += `<option value="${selectedValue}" selected>${selectedValue} (自)</option>`;
    }

    return `
      <div style="display: flex; gap: 4px; align-items: center; width: 100%;">
        <select class="cell-input row-type" onchange="updateItemSummary(this); updateGrandTotal()" style="flex: 1; padding-right: 18px;">
          ${optionsHtml}
        </select>
        <button type="button" class="btn-primary" onclick="switchToCustomCategory(this)" title="手動輸入" style="padding: 4px 6px; font-size: 0.75rem; border-radius: 6px; white-space: nowrap;">✏️</button>
      </div>
    `;
  }

  function switchToCustomCategory(btn) {
    const container = btn.closest('div');
    const select = container.querySelector('select');
    const currentVal = select ? select.value : '';
    container.outerHTML = `
      <div style="display: flex; gap: 4px; align-items: center; width: 100%;">
        <div class="clearable-input-wrapper" style="flex: 1;">
          <input type="text" class="cell-input row-type" value="${currentVal}" placeholder="自訂類別" oninput="updateItemSummary(this); updateGrandTotal()">
          <button class="clear-btn" onclick="clearInput(this)">×</button>
        </div>
        <button type="button" class="btn-danger" onclick="switchToSelectCategory(this)" title="切換回選單" style="padding: 4px 6px; font-size: 0.75rem; border-radius: 6px; white-space: nowrap;">📋</button>
      </div>
    `;
    updateGrandTotal();
  }

  function switchToSelectCategory(btn) {
    const container = btn.closest('div');
    const input = container.querySelector('input');
    const currentVal = input ? input.value : '';
    container.outerHTML = renderCategorySelect(currentVal);
    updateGrandTotal();
  }

  function clearInput(btn) {
    const wrapper = btn.closest('.clearable-input-wrapper');
    const input = wrapper.querySelector('input, textarea, select');
    if (input) {
      input.value = '';
      input.dispatchEvent(new Event('input', { bubbles: true }));
    }
  }

  function renderLinkButtons(text) {
    if (!text) return '';
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    let html = '';
    let match;

    if (!urlRegex.test(text)) return ''; 
    urlRegex.lastIndex = 0; 

    while ((match = urlRegex.exec(text)) !== null) {
      const url = match[0];
      let btnText = '🔗 連結';
      if (url.includes('maps.app.goo.gl') || url.includes('google.com/maps')) {
        btnText = '🗺️ 地圖';
      } else if (url.includes('agoda') || url.includes('booking')) {
        btnText = '🏨 訂房';
      } else if (url.includes('klook') || url.includes('kkday')) {
        btnText = '🎫 票券';
      }
      html += `<a href="${url}" target="_blank" rel="noopener noreferrer" class="link-badge">${btnText}</a>`;
    }
    return html;
  }

  function updateItemSummary(inputEl) {
    const card = inputEl.closest('.item-card');
    if (!card) return;
    
    const typeEl = card.querySelector('.row-type');
    const detailEl = card.querySelector('.row-detail');
    const twdEl = card.querySelector('.twd-val');

    const type = typeEl ? (typeEl.value || '未分類') : '未分類';
    const detail = detailEl ? (detailEl.value || '未命名項目') : '未命名項目';
    const twd = twdEl ? (twdEl.value || 0) : 0;

    card.querySelector('.item-badge-tag').innerText = type;
    card.querySelector('.item-summary-title').innerText = detail;
    card.querySelector('.item-summary-amount').innerText = 'NT$ ' + Number(twd).toLocaleString('zh-TW');
  }

  function collectDataFromDOM() {
    const newData = {
      rate: document.getElementById('global-rate').value,
      flight: {
        outDate: document.getElementById('flight-out-date').value,
        outTime: document.getElementById('flight-out-time').value,
        outNo: document.getElementById('flight-out-no').value,
        inDate: document.getElementById('flight-in-date').value,
        inTime: document.getElementById('flight-in-time').value,
        inNo: document.getElementById('flight-in-no').value
      },
      parts: {}
    };

    document.querySelectorAll('.part-section').forEach((partEl, pIdx) => {
      const partKey = `part${pIdx + 1}`;
      const partTitle = partEl.querySelector('.part-title-input').value;
      newData.parts[partKey] = { title: partTitle, days: {} };

      partEl.querySelectorAll('.day-card').forEach((dayEl, dIdx) => {
        const dayKey = `day${dIdx + 1}`;
        const dayTitle = dayEl.querySelector('.day-input').value;
        const dayBase = dayEl.querySelector('.base-input').value;
        newData.parts[partKey].days[dayKey] = { title: dayTitle, base: dayBase, items: {} };

        dayEl.querySelectorAll('.item-card').forEach((itemEl, iIdx) => {
          const itemKey = `item${iIdx + 1}`;
          const typeEl = itemEl.querySelector('.row-type');
          const type = typeEl ? typeEl.value : '交通';
          const detail = itemEl.querySelector('.row-detail').value;
          const jpy = parseFloat(itemEl.querySelector('.jpy-val').value) || 0;
          const twd = parseFloat(itemEl.querySelector('.twd-val').value) || 0;
          const note = itemEl.querySelector('.row-note').value;

          newData.parts[partKey].days[dayKey].items[itemKey] = { type, detail, jpy, twd, note };
        });
      });
    });

    return newData;
  }

  function renderUI(data) {
    if (data.rate) {
      document.getElementById('global-rate').value = data.rate;
    }
    if (data.flight) {
      document.getElementById('flight-out-date').value = data.flight.outDate || '';
      document.getElementById('flight-out-time').value = data.flight.outTime || '';
      document.getElementById('flight-out-no').value = data.flight.outNo || '';
      document.getElementById('flight-in-date').value = data.flight.inDate || '';
      document.getElementById('flight-in-time').value = data.flight.inTime || '';
      document.getElementById('flight-in-no').value = data.flight.inNo || '';
    }

    const container = document.getElementById('itinerary-container');
    container.innerHTML = '';

    const parts = data.parts || {};
    Object.keys(parts).forEach(partKey => {
      const part = parts[partKey];
      const partDiv = document.createElement('div');
      partDiv.className = 'part-section';
      partDiv.dataset.key = partKey;

      let daysHtml = '';
      const days = part.days || {};
      Object.keys(days).forEach(dayKey => {
        const day = days[dayKey];
        
        let itemsHtml = '';
        const items = day.items || {};
        Object.keys(items).forEach(itemKey => {
          const item = items[itemKey];
          const twd = item.twd !== undefined ? item.twd : Math.round((item.jpy || 0) * getRate());
          const rawNote = item.note || '';
          const linkHtml = renderLinkButtons(rawNote);

          itemsHtml += `
            <div class="item-card">
              <div class="item-summary-bar" onclick="toggleItemCard(this)">
                <div class="item-summary-left">
                  <span class="item-badge-tag">${item.type || '交通'}</span>
                  <span class="item-summary-title">${item.detail || '未命名項目'}</span>
                </div>
                <div class="item-summary-right">
                  <span class="item-summary-amount">NT$ ${Number(twd).toLocaleString('zh-TW')}</span>
                  <span class="expand-arrow">▼</span>
                </div>
              </div>
              <div class="item-details-content">
                <div class="detail-grid-row">
                  <div>
                    <label style="font-size:0.75rem; color:var(--text-muted); font-weight:600;">類別：</label>
                    ${renderCategorySelect(item.type || '交通')}
                  </div>
                  <div>
                    <label style="font-size:0.75rem; color:var(--text-muted); font-weight:600;">細項名稱：</label>
                    ${wrapClearable('text', 'cell-input row-detail', item.detail || '', '細項 / 規劃')}
                  </div>
                </div>
                <div>
                  <label style="font-size:0.75rem; color:var(--text-muted); font-weight:600;">預估花費 (日幣 ⇄ 台幣)：</label>
                  <div class="cost-box">
                    <div class="input-group"><span class="curr-tag">JPY</span><input type="number" class="cost-input jpy-val" value="${item.jpy || 0}" oninput="jpyInputChanged(this)"></div>
                    <span style="color:var(--text-muted)">➔</span>
                    <div class="input-group"><span class="curr-tag">NT$</span><input type="number" class="cost-input twd-val" value="${twd}" oninput="twdInputChanged(this)"></div>
                  </div>
                </div>
                <div>
                  <label style="font-size:0.75rem; color:var(--text-muted); font-weight:600;">備註 / 超連結：</label>
                  <div class="note-container">
                    ${wrapClearable('textarea', 'cell-input row-note', rawNote, '說明或貼上網址', 2)}
                    <div class="note-preview-area">${linkHtml}</div>
                  </div>
                </div>
                <div style="text-align: right; margin-top: 4px;">
                  <button class="btn-danger" onclick="deleteRow(this)">刪除此項目</button>
                </div>
              </div>
            </div>
          `;
        });

        daysHtml += `
          <div class="day-card" data-key="${dayKey}">
            <div class="day-header">
              ${wrapClearable('text', 'day-input', day.title || '', 'Day 名稱')}
              ${wrapClearable('text', 'base-input', day.base || '', 'Base：住宿地點')}
              <button class="btn-danger" onclick="deleteDay(this)">刪除此日</button>
            </div>
            <div class="day-items-container">${itemsHtml}</div>
            <div class="add-row-container"><button class="add-row-btn" onclick="addRow(this)">+ 新增此日行程</button></div>
          </div>
        `;
      });

      partDiv.innerHTML = `
        <div class="part-header">
          ${wrapClearable('text', 'part-title-input', part.title || '', '分區標題')}
          <div class="part-actions">
            <button onclick="addDay(this)" class="btn-primary" style="padding: 5px 10px; font-size: 0.8rem; border-radius: 6px;">+ 新增天數</button>
            <button onclick="deletePart(this)" class="btn-danger">刪除區塊</button>
          </div>
        </div>
        <div class="days-container">${daysHtml}</div>
      `;
      container.appendChild(partDiv);
    });

    updateGrandTotal();
  }

  function updateNotePreview(textarea) {
    const container = textarea.closest('.note-container');
    const previewArea = container.querySelector('.note-preview-area');
    previewArea.innerHTML = renderLinkButtons(textarea.value);
  }

  function jpyInputChanged(input) {
    const card = input.closest('.item-card');
    const jpy = parseFloat(input.value) || 0;
    const twdInput = card.querySelector('.twd-val');
    twdInput.value = Math.round(jpy * getRate());
    updateItemSummary(input);
    updateGrandTotal();
  }

  function twdInputChanged(input) {
    const card = input.closest('.item-card');
    const twd = parseFloat(input.value) || 0;
    const jpyInput = card.querySelector('.jpy-val');
    const rate = getRate();
    if (rate > 0) {
      jpyInput.value = Math.round(twd / rate);
    }
    updateItemSummary(input);
    updateGrandTotal();
  }

  function recalculateAll() {
    const rate = getRate();
    document.querySelectorAll('.item-card').forEach(card => {
      const jpy = parseFloat(card.querySelector('.jpy-val').value) || 0;
      card.querySelector('.twd-val').value = Math.round(jpy * rate);
      updateItemSummary(card.querySelector('.jpy-val'));
    });
    updateGrandTotal();
  }

  function updateGrandTotal() {
    let grandTotal = 0;
    const categoryTotals = {};

    document.querySelectorAll('.item-card').forEach(card => {
      const typeEl = card.querySelector('.row-type');
      let cat = typeEl ? typeEl.value.trim() : '未分類';
      if (!cat) cat = '未分類';

      const twdVal = parseFloat(card.querySelector('.twd-val').value) || 0;
      grandTotal += twdVal;

      if (!categoryTotals[cat]) {
        categoryTotals[cat] = 0;
      }
      categoryTotals[cat] += twdVal;
    });

    document.getElementById('grand-total-twd').innerText = 'NT$ ' + Math.round(grandTotal).toLocaleString('zh-TW');

    const breakdownContainer = document.getElementById('category-breakdown');
    let breakdownHtml = '';

    const sortedCats = Object.keys(categoryTotals).sort((a, b) => {
      const idxA = categories.indexOf(a);
      const idxB = categories.indexOf(b);
      if (idxA !== -1 && idxB !== -1) return idxA - idxB;
      if (idxA !== -1) return -1;
      if (idxB !== -1) return 1;
      return a.localeCompare(b);
    });

    sortedCats.forEach(cat => {
      const amount = categoryTotals[cat];
      if (amount > 0) {
        breakdownHtml += `
          <div class="cat-badge">
            ${cat}: <span>NT$ ${Math.round(amount).toLocaleString('zh-TW')}</span>
          </div>
        `;
      }
    });

    breakdownContainer.innerHTML = breakdownHtml;
  }

  function deleteRow(btn) {
    btn.closest('.item-card').remove();
    updateGrandTotal();
  }

  function addRow(btn) {
    const container = btn.closest('.day-card').querySelector('.day-items-container');
    const itemCard = document.createElement('div');
    itemCard.className = 'item-card expanded'; // 新增時預設展開方便直接編輯
    itemCard.innerHTML = `
      <div class="item-summary-bar" onclick="toggleItemCard(this)">
        <div class="item-summary-left">
          <span class="item-badge-tag">交通</span>
          <span class="item-summary-title">新項目</span>
        </div>
        <div class="item-summary-right">
          <span class="item-summary-amount">NT$ 0</span>
          <span class="expand-arrow">▼</span>
        </div>
      </div>
      <div class="item-details-content">
        <div class="detail-grid-row">
          <div>
            <label style="font-size:0.75rem; color:var(--text-muted); font-weight:600;">類別：</label>
            ${renderCategorySelect('交通')}
          </div>
          <div>
            <label style="font-size:0.75rem; color:var(--text-muted); font-weight:600;">細項名稱：</label>
            ${wrapClearable('text', 'cell-input row-detail', '新項目', '細項 / 規劃')}
          </div>
        </div>
        <div>
          <label style="font-size:0.75rem; color:var(--text-muted); font-weight:600;">預估花費 (日幣 ⇄ 台幣)：</label>
          <div class="cost-box">
            <div class="input-group"><span class="curr-tag">JPY</span><input type="number" class="cost-input jpy-val" value="0" oninput="jpyInputChanged(this)"></div>
            <span style="color:var(--text-muted)">➔</span>
            <div class="input-group"><span class="curr-tag">NT$</span><input type="number" class="cost-input twd-val" value="0" oninput="twdInputChanged(this)"></div>
          </div>
        </div>
        <div>
          <label style="font-size:0.75rem; color:var(--text-muted); font-weight:600;">備註 / 超連結：</label>
          <div class="note-container">
            ${wrapClearable('textarea', 'cell-input row-note', '', '說明或貼上網址', 2)}
            <div class="note-preview-area"></div>
          </div>
        </div>
        <div style="text-align: right; margin-top: 4px;">
          <button class="btn-danger" onclick="deleteRow(this)">刪除此項目</button>
        </div>
      </div>
    `;
    container.appendChild(itemCard);
    updateGrandTotal();
  }

  function deleteDay(btn) {
    btn.closest('.day-card').remove();
    updateGrandTotal();
  }

  function addDay(btn) {
    const partSection = btn.closest('.part-section');
    const daysContainer = partSection.querySelector('.days-container');
    const dayDiv = document.createElement('div');
    dayDiv.className = 'day-card';
    dayDiv.innerHTML = `
      <div class="day-header">
        ${wrapClearable('text', 'day-input', 'Day X 新的一天', 'Day 名稱')}
        ${wrapClearable('text', 'base-input', '住宿地點', 'Base：住宿地點')}
        <button class="btn-danger" onclick="deleteDay(this)">刪除此日</button>
      </div>
      <div class="day-items-container">
        <div class="item-card expanded">
          <div class="item-summary-bar" onclick="toggleItemCard(this)">
            <div class="item-summary-left">
              <span class="item-badge-tag">交通</span>
              <span class="item-summary-title">新項目</span>
            </div>
            <div class="item-summary-right">
              <span class="item-summary-amount">NT$ 0</span>
              <span class="expand-arrow">▼</span>
            </div>
          </div>
          <div class="item-details-content">
            <div class="detail-grid-row">
              <div>
                <label style="font-size:0.75rem; color:var(--text-muted); font-weight:600;">類別：</label>
                ${renderCategorySelect('交通')}
              </div>
              <div>
                <label style="font-size:0.75rem; color:var(--text-muted); font-weight:600;">細項名稱：</label>
                ${wrapClearable('text', 'cell-input row-detail', '新項目', '細項 / 規劃')}
              </div>
            </div>
            <div>
              <label style="font-size:0.75rem; color:var(--text-muted); font-weight:600;">預估花費 (日幣 ⇄ 台幣)：</label>
              <div class="cost-box">
                <div class="input-group"><span class="curr-tag">JPY</span><input type="number" class="cost-input jpy-val" value="0" oninput="jpyInputChanged(this)"></div>
                <span style="color:var(--text-muted)">➔</span>
                <div class="input-group"><span class="curr-tag">NT$</span><input type="number" class="cost-input twd-val" value="0" oninput="twdInputChanged(this)"></div>
              </div>
            </div>
            <div>
              <label style="font-size:0.75rem; color:var(--text-muted); font-weight:600;">備註 / 超連結：</label>
              <div class="note-container">
                ${wrapClearable('textarea', 'cell-input row-note', '', '說明或貼上網址', 2)}
                <div class="note-preview-area"></div>
              </div>
            </div>
            <div style="text-align: right; margin-top: 4px;">
              <button class="btn-danger" onclick="deleteRow(this)">刪除此項目</button>
            </div>
          </div>
        </div>
      </div>
      <div class="add-row-container"><button class="add-row-btn" onclick="addRow(this)">+ 新增此日行程</button></div>
    `;
    daysContainer.appendChild(dayDiv);
    updateGrandTotal();
  }

  function addPart() {
    tripData = collectDataFromDOM();
    const pKeys = Object.keys(tripData.parts);
    const newPKey = `part${pKeys.length + 1}`;
    tripData.parts[newPKey] = {
      title: `PART ${pKeys.length + 1}：新篇章`,
      days: {
        day1: { title: "Day 1", base: "住宿地點", items: { item1: { type: "交通", detail: "項目", jpy: 0, twd: 0, note: "" } } }
      }
    };
    renderUI(tripData);
  }

  function deletePart(btn) {
    if (confirm('確定要刪除整個 PART 區塊嗎？')) {
      btn.closest('.part-section').remove();
      updateGrandTotal();
    }
  }

  function resetData() {
    if (confirm('確定要重整頁面嗎？未儲存的變更將會遺失。')) {
      location.reload();
    }
  }
</script>

<!-- Firebase 即時同步模組 -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBae8XMFtZJiT51DjqqOcfNF2DeNUw9lOc",
    authDomain: "travel-sync-54836.firebaseapp.com",
    databaseURL: "https://travel-sync-54836-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "travel-sync-54836",
    storageBucket: "travel-sync-54836.firebasestorage.app",
    messagingSenderId: "788264955445",
    appId: "1:788264955445:web:d00c5caa0bc6695f264b7c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.saveDataToFirebase = async function() {
    const currentStructuredData = collectDataFromDOM();
    try {
      await set(ref(db, "japan_travel"), currentStructuredData);
      alert("✅ 行程資料已成功同步至雲端！");
    } catch (err) {
      console.error(err);
      alert("❌ 同步失敗：" + err.message);
    }
  };

  function initFirebaseSync() {
    const tripRef = ref(db, "japan_travel");
    let isInitialLoad = true;

    onValue(tripRef, (snapshot) => {
      if (snapshot.exists()) {
        const data = snapshot.val();
        if (data && data.parts) {
          tripData = data;
          renderUI(tripData);
          if (isInitialLoad) {
            console.log("⚡ 已成功從雲端載入結構化資料");
            isInitialLoad = false;
          }
        }
      } else {
        renderUI(tripData);
      }
    });
  }

  initFirebaseSync();
</script>
