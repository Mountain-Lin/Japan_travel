<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本行程與預算管理 (結構化版)</title>
  <style>
    /* ================= 櫻花粉白系質感與風格設定 ================= */
    :root {
      --bg-color: #fcf6f7;
      --card-bg: #ffffff;
      --text-color: #4a4044;
      --text-muted: #8c7d82;
      --border-color: #f0d5dc;
      --accent-pink: #ff758c;
      --accent-pink-hover: #ff5270;
      --accent-purple: #8b5cf6;
      --accent-green: #2ecc71;
      --danger-color: #ff6b6b;
      --glow-shadow: 0 8px 25px rgba(255, 117, 140, 0.12);
      --card-shadow: 0 4px 15px rgba(220, 195, 202, 0.2);
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 15px;
      line-height: 1.6;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 10px;
    }

    /* 頂部控制面板 */
    .top-panel {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 25px;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--glow-shadow);
    }

    .budget-summary {
      font-size: 1.25rem;
      font-weight: bold;
      color: #e65c7b;
      letter-spacing: 0.5px;
    }

    .control-group {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    input, button, select {
      background: #faf5f6;
      color: var(--text-color);
      border: 1px solid var(--border-color);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s;
    }

    input:focus {
      border-color: var(--accent-pink);
      box-shadow: 0 0 8px rgba(255, 117, 140, 0.3);
    }

    input[type="number"] {
      width: 85px;
    }

    button {
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .btn-primary { 
      background: linear-gradient(135deg, #ff758c, #ff7eb3); 
      color: white; 
      border: none; 
      box-shadow: 0 4px 10px rgba(255, 117, 140, 0.3);
    }
    .btn-primary:hover { background: linear-gradient(135deg, #ff5270, #ff639c); }

    .btn-danger { 
      background: #fff0f1; 
      color: var(--danger-color); 
      border: 1px solid #ffd1d5; 
    }
    .btn-danger:hover { background: var(--danger-color); color: white; }

    .btn-success { 
      background: linear-gradient(135deg, #2ecc71, #27ae60); 
      color: white; 
      border: none; 
      box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
    }
    .btn-success:hover { background: linear-gradient(135deg, #27ae60, #1e8449); }

    /* PART 區塊樣式 */
    .part-section {
      background: #ffffff;
      border: 2px dashed #f0d5dc;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: var(--card-shadow);
    }

    .part-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      border-bottom: 2px solid #ffdbe3;
      padding-bottom: 10px;
    }

    .part-title-input {
      font-size: 1.2rem;
      font-weight: bold;
      color: #9c4d63;
      border: 1px solid transparent;
      background: transparent;
      width: 60%;
    }
    .part-title-input:focus {
      background: #faf5f6;
      border-color: var(--accent-pink);
    }

    /* Day 卡片樣式 */
    .day-card {
      background: #faf5f6;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      margin-bottom: 15px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(220, 195, 202, 0.15);
    }

    .day-header {
      background: linear-gradient(to right, #ffeef2, #faf5f6);
      padding: 12px 15px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 6px solid var(--accent-pink);
      border-bottom: 1px solid var(--border-color);
      gap: 10px;
      flex-wrap: wrap;
    }

    .day-input {
      background: transparent;
      border: 1px solid transparent;
      font-weight: bold;
      color: var(--text-color);
      font-size: 1rem;
      flex: 1;
      min-width: 200px;
    }
    .day-input:focus {
      background: white;
      border-color: var(--accent-pink);
    }

    .base-input {
      background: #ffffff;
      border: 1px solid #ffdbe3;
      font-size: 0.85rem;
      color: #9c6c77;
      padding: 4px 8px;
      border-radius: 6px;
      width: 140px;
    }

    /* 表格樣式 */
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid #f0d5dc;
      font-size: 0.9rem;
    }

    th {
      background: #f4eaed;
      color: var(--text-muted);
      font-weight: 600;
    }

    /* 表格欄位輸入框 */
    .cell-input {
      background: #ffffff;
      border: 1px solid var(--border-color);
      width: 100%;
      padding: 6px;
      border-radius: 6px;
      color: var(--text-color);
    }
    .cell-input:focus {
      border-color: var(--accent-pink);
    }

    /* 費用輸入群組 */
    .cost-box {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .input-group {
      display: flex;
      align-items: center;
      background: #ffffff;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      overflow: hidden;
    }

    .curr-tag {
      padding: 4px 6px;
      font-size: 0.8rem;
      background: #f0e1e5;
      color: #7a686e;
    }

    .cost-input {
      border: none;
      background: transparent;
      padding: 4px;
      width: 70px;
      color: var(--text-color);
    }

    .twd-val {
      color: #e0566d;
      font-weight: bold;
    }

    .del-row-btn {
      background: transparent;
      border: none;
      color: #ff85a1;
      font-size: 1.1rem;
      cursor: pointer;
    }
    .del-row-btn:hover { color: var(--danger-color); }

    .add-row-container {
      padding: 10px;
      text-align: center;
      background: #ffffff;
    }

    .add-row-btn, .add-day-btn, .add-part-btn {
      background: #faf5f6;
      border: 1px dashed #e6b8c3;
      color: #b07d89;
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    .add-row-btn:hover, .add-day-btn:hover, .add-part-btn:hover {
      background: #fff0f3;
      border-color: var(--accent-pink);
      color: var(--accent-pink);
    }

    .global-actions {
      text-align: center;
      margin: 25px 0;
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* 響應式手機優化 */
    @media (max-width: 768px) {
      .top-panel { flex-direction: column; align-items: stretch; }
      .control-group { justify-content: space-between; }
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      tr {
        margin-bottom: 10px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: #ffffff;
        padding: 8px;
      }
      td { border: none; padding: 5px 0; display: flex; justify-content: space-between; align-items: center; }
      td::before { color: var(--text-muted); font-weight: 600; }
      td:nth-child(1)::before { content: "類別："; }
      td:nth-child(2)::before { content: "明細："; }
      td:nth-child(3)::before { content: "費用："; }
      td:nth-child(4)::before { content: "備註："; }
      .cost-box { width: 100%; justify-content: flex-end; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- 頂部控制面板 -->
  <div class="top-panel">
    <div class="budget-summary">
      🌸 總預算估算：<span id="grand-total-twd">NT$ 0</span>
    </div>
    <div class="control-group">
      <label style="font-size: 0.9rem; font-weight: 600;">匯率 (JPY➔TWD):</label>
      <input type="number" id="global-rate" value="0.22" step="0.01" oninput="recalculateAll()">
      <button class="btn-success" onclick="saveDataToFirebase()">☁️ 同步雲端</button>
      <button class="btn-danger" onclick="resetData()">重置</button>
    </div>
  </div>

  <!-- 行程容器 -->
  <div id="itinerary-container"></div>

  <!-- 全域新增按鈕 -->
  <div class="global-actions">
    <button class="btn-primary add-part-btn" onclick="addPart()" style="padding: 10px 20px; border-radius: 10px; width: auto;">➕ 新增區塊 (PART)</button>
  </div>

</div>

<script>
  // 預設結構化資料 (若資料庫無資料時使用)
  let tripData = {
    rate: 0.22,
    parts: {
      part1: {
        title: "PART 1：北海道極光與玩雪篇",
        days: {
          day1: {
            title: "Day 1 抵達與市區漫步",
            base: "札幌車站周邊",
            items: {
              item1: { type: "交通", detail: "機場快線車票", jpy: 1150, note: "兩人同行" }
            }
          }
        }
      }
    }
  };

  function getRate() {
    const val = parseFloat(document.getElementById('global-rate').value);
    return isNaN(val) || val <= 0 ? 0.22 : val;
  }

  // 從畫面的 DOM 收集資料轉成結構化 JSON
  function collectDataFromDOM() {
    const newData = {
      rate: document.getElementById('global-rate').value,
      parts: {}
    };

    document.querySelectorAll('.part-section').forEach((partEl, pIdx) => {
      const partKey = `part${pIdx + 1}`;
      const partTitle = partEl.querySelector('.part-title-input').value;
      newData.parts[partKey] = { title: partTitle, days: {} };

      partEl.querySelectorAll('.day-card').forEach((dayEl, dIdx) => {
        const dayKey = `day${dIdx + 1}`;
        const dayTitle = dayEl.querySelector('.day-input').value;
        const dayBase = dayEl.querySelector('.base-input').value;
        newData.parts[partKey].days[dayKey] = { title: dayTitle, base: dayBase, items: {} };

        dayEl.querySelectorAll('tbody tr').forEach((rowEl, iIdx) => {
          const itemKey = `item${iIdx + 1}`;
          const type = rowEl.querySelector('.row-type').value;
          const detail = rowEl.querySelector('.row-detail').value;
          const jpy = parseFloat(rowEl.querySelector('.jpy-val').value) || 0;
          const note = rowEl.querySelector('.row-note').value;

          newData.parts[partKey].days[dayKey].items[itemKey] = { type, detail, jpy, note };
        });
      });
    });

    return newData;
  }

  // 渲染畫面：根據資料物件用 JS 產生 HTML
  function renderUI(data) {
    if (data.rate) {
      document.getElementById('global-rate').value = data.rate;
    }
    const container = document.getElementById('itinerary-container');
    container.innerHTML = '';

    const parts = data.parts || {};
    Object.keys(parts).forEach(partKey => {
      const part = parts[partKey];
      const partDiv = document.createElement('div');
      partDiv.className = 'part-section';
      partDiv.dataset.key = partKey;

      let daysHtml = '';
      const days = part.days || {};
      Object.keys(days).forEach(dayKey => {
        const day = days[dayKey];
        
        let itemsHtml = '';
        const items = day.items || {};
        Object.keys(items).forEach(itemKey => {
          const item = items[itemKey];
          const twd = Math.round((item.jpy || 0) * getRate());
          itemsHtml += `
            <tr>
              <td><input type="text" class="cell-input row-type" value="${item.type || ''}" oninput="updateTotalOnly()"></td>
              <td><input type="text" class="cell-input row-detail" value="${item.detail || ''}" oninput="updateTotalOnly()"></td>
              <td>
                <div class="cost-box">
                  <div class="input-group"><span class="curr-tag">JPY</span><input type="number" class="cost-input jpy-val" value="${item.jpy || 0}" oninput="rowInputChanged(this)"></div>
                  <span style="color:var(--text-muted)">➔</span>
                  <div class="input-group"><span class="curr-tag">NT$</span><input type="number" class="cost-input twd-val" readonly value="${twd}"></div>
                </div>
              </td>
              <td><input type="text" class="cell-input row-note" value="${item.note || ''}" oninput="updateTotalOnly()"></td>
              <td style="text-align: center;"><button class="del-row-btn" onclick="deleteRow(this)">✕</button></td>
            </tr>
          `;
        });

        daysHtml += `
          <div class="day-card" data-key="${dayKey}">
            <div class="day-header">
              <input type="text" class="day-input" value="${day.title || ''}" oninput="updateTotalOnly()">
              <input type="text" class="base-input" value="${day.base || ''}" placeholder="Base：住宿地點" oninput="updateTotalOnly()">
              <button class="btn-danger" style="padding: 3px 8px; font-size: 0.75rem; border-radius: 6px;" onclick="deleteDay(this)">刪除此日</button>
            </div>
            <table>
              <thead>
                <tr><th>類別</th><th>費用細項 / 規劃</th><th>預估花費 (日幣 ➔ 台幣)</th><th>備註 / 說明</th><th style="width: 40px;"></th></tr>
              </thead>
              <tbody>${itemsHtml}</tbody>
            </table>
            <div class="add-row-container"><button class="add-row-btn" onclick="addRow(this)">+ 新增此日行程</button></div>
          </div>
        `;
      });

      partDiv.innerHTML = `
        <div class="part-header">
          <input type="text" class="part-title-input" value="${part.title || ''}" oninput="updateTotalOnly()">
          <div>
            <button onclick="addDay(this)" class="btn-primary" style="padding: 4px 10px; font-size: 0.8rem; border-radius: 6px;">+ 新增此區天數</button>
            <button onclick="deletePart(this)" class="btn-danger" style="padding: 4px 10px; font-size: 0.8rem; border-radius: 6px;">刪除區塊</button>
          </div>
        </div>
        <div class="days-container">${daysHtml}</div>
      `;
      container.appendChild(partDiv);
    });

    updateGrandTotal();
  }

  // 即時計算單行與總預算
  function rowInputChanged(input) {
    const row = input.closest('tr');
    const jpy = parseFloat(input.value) || 0;
    const twd = Math.round(jpy * getRate());
    row.querySelector('.twd-val').value = twd;
    updateGrandTotal();
  }

  function recalculateAll() {
    const rate = getRate();
    document.querySelectorAll('tbody tr').forEach(row => {
      const jpy = parseFloat(row.querySelector('.jpy-val').value) || 0;
      row.querySelector('.twd-val').value = Math.round(jpy * rate);
    });
    updateGrandTotal();
  }

  function updateTotalOnly() {
    // 只是打字不影響金額時觸發，可選
  }

  function updateGrandTotal() {
    let total = 0;
    document.querySelectorAll('.twd-val').forEach(input => {
      const val = parseFloat(input.value);
      if (!isNaN(val)) total += val;
    });
    document.getElementById('grand-total-twd').innerText = 'NT$ ' + Math.round(total).toLocaleString('zh-TW');
  }

  // 增刪互動函式
  function deleteRow(btn) {
    btn.closest('tr').remove();
    updateGrandTotal();
  }

  function addRow(btn) {
    const tbody = btn.closest('.day-card').querySelector('tbody');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="text" class="cell-input row-type" value="交通" oninput="updateTotalOnly()"></td>
      <td><input type="text" class="cell-input row-detail" value="新項目" oninput="updateTotalOnly()"></td>
      <td>
        <div class="cost-box">
          <div class="input-group"><span class="curr-tag">JPY</span><input type="number" class="cost-input jpy-val" value="0" oninput="rowInputChanged(this)"></div>
          <span style="color:var(--text-muted)">➔</span>
          <div class="input-group"><span class="curr-tag">NT$</span><input type="number" class="cost-input twd-val" readonly value="0"></div>
        </div>
      </td>
      <td><input type="text" class="cell-input row-note" value="" oninput="updateTotalOnly()"></td>
      <td style="text-align: center;"><button class="del-row-btn" onclick="deleteRow(this)">✕</button></td>
    `;
    tbody.appendChild(tr);
    updateGrandTotal();
  }

  function deleteDay(btn) {
    btn.closest('.day-card').remove();
    updateGrandTotal();
  }

  function addDay(btn) {
    const partSection = btn.closest('.part-section');
    const daysContainer = partSection.querySelector('.days-container');
    const dayDiv = document.createElement('div');
    dayDiv.className = 'day-card';
    dayDiv.innerHTML = `
      <div class="day-header">
        <input type="text" class="day-input" value="Day X 新的一天" oninput="updateTotalOnly()">
        <input type="text" class="base-input" value="Base：住宿" placeholder="Base：住宿地點" oninput="updateTotalOnly()">
        <button class="btn-danger" style="padding: 3px 8px; font-size: 0.75rem; border-radius: 6px;" onclick="deleteDay(this)">刪除此日</button>
      </div>
      <table>
        <thead>
          <tr><th>類別</th><th>費用細項 / 規劃</th><th>預估花費 (日幣 ➔ 台幣)</th><th>備註 / 說明</th><th style="width: 40px;"></th></tr>
        </thead>
        <tbody>
          <tr>
            <td><input type="text" class="cell-input row-type" value="交通" oninput="updateTotalOnly()"></td>
            <td><input type="text" class="cell-input row-detail" value="新項目" oninput="updateTotalOnly()"></td>
            <td>
              <div class="cost-box">
                <div class="input-group"><span class="curr-tag">JPY</span><input type="number" class="cost-input jpy-val" value="0" oninput="rowInputChanged(this)"></div>
                <span style="color:var(--text-muted)">➔</span>
                <div class="input-group"><span class="curr-tag">NT$</span><input type="number" class="cost-input twd-val" readonly value="0"></div>
              </div>
            </td>
            <td><input type="text" class="cell-input row-note" value="" oninput="updateTotalOnly()"></td>
            <td style="text-align: center;"><button class="del-row-btn" onclick="deleteRow(this)">✕</button></td>
          </tr>
        </tbody>
      </table>
      <div class="add-row-container"><button class="add-row-btn" onclick="addRow(this)">+ 新增此日行程</button></div>
    `;
    daysContainer.appendChild(dayDiv);
    updateGrandTotal();
  }

  function addPart() {
    tripData = collectDataFromDOM();
    const pKeys = Object.keys(tripData.parts);
    const newPKey = `part${pKeys.length + 1}`;
    tripData.parts[newPKey] = {
      title: `PART ${pKeys.length + 1}：新篇章`,
      days: {
        day1: { title: "Day 1", base: "住宿地點", items: { item1: { type: "交通", detail: "項目", jpy: 0, note: "" } } }
      }
    };
    renderUI(tripData);
  }

  function deletePart(btn) {
    if (confirm('確定要刪除整個 PART 區塊嗎？')) {
      btn.closest('.part-section').remove();
      updateGrandTotal();
    }
  }

  function resetData() {
    if (confirm('確定要重整頁面嗎？未儲存的變更將會遺失。')) {
      location.reload();
    }
  }
</script>

<!-- Firebase 即時同步模組 (結構化儲存) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBae8XMFtZJiT51DjqqOcfNF2DeNUw9lOc",
    authDomain: "travel-sync-54836.firebaseapp.com",
    databaseURL: "https://travel-sync-54836-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "travel-sync-54836",
    storageBucket: "travel-sync-54836.firebasestorage.app",
    messagingSenderId: "788264955445",
    appId: "1:788264955445:web:d00c5caa0bc6695f264b7c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.saveDataToFirebase = async function() {
    const currentStructuredData = collectDataFromDOM();
    try {
      // 直接把乾淨的結構化物件存入 japan_travel 節點
      await set(ref(db, "japan_travel"), currentStructuredData);
      alert("✅ 結構化資料已成功同步至雲端！");
    } catch (err) {
      console.error(err);
      alert("❌ 同步失敗：" + err.message);
    }
  };

  function initFirebaseSync() {
    const tripRef = ref(db, "japan_travel");
    let isInitialLoad = true;

    onValue(tripRef, (snapshot) => {
      if (snapshot.exists()) {
        const data = snapshot.val();
        // 如果資料庫存的是舊版 html 字串，會先略過以免報錯，讓您可以直接用新版覆蓋
        if (data && data.parts) {
          tripData = data;
          renderUI(tripData);
          if (isInitialLoad) {
            console.log("⚡ 已成功從雲端載入結構化資料");
            isInitialLoad = false;
          }
        }
      } else {
        // 若資料庫完全空白，初始化預設畫面
        renderUI(tripData);
      }
    });
  }

  initFirebaseSync();
</script>

</body>
</html>

```
