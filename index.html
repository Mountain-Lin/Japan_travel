<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸☃️日本行程與預算管理☃️🌸</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇯🇵</text></svg>">
  <style>
    :root {
      --brand-primary: #4F46E5;
      --brand-primary-hover: #4338CA;
      --brand-accent: #06B6D4;
      --bg-main: #F8FAFC;
      --bg-card: #FFFFFF;
      --text-main: #0F172A;
      --text-muted: #64748B;
      --border-color: #E2E8F0;
      --danger-color: #EF4444;
      --danger-hover: #DC2626;
      --success-color: #10B981;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --radius-lg: 16px;
      --radius-md: 10px;
      --radius-sm: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    body { background-color: var(--bg-main); color: var(--text-main); line-height: 1.5; padding: 16px; max-width: 1000px; margin: 0 auto; }

    header { margin-bottom: 16px; }
    h1 { font-size: 1.75rem; font-weight: 800; color: var(--text-main); margin-bottom: 6px; }
    p.subtitle { color: var(--text-muted); font-size: 0.9rem; }

    /* 全域頂部大頁籤 Navigation Tabs */
    .nav-tabs-wrapper {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-main);
      padding: 8px 0;
      margin-bottom: 16px;
      border-bottom: 2px solid var(--border-color);
    }
    .nav-tabs {
      display: flex;
      gap: 12px;
    }
    .nav-tab-btn {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .nav-tab-btn:hover {
      background: #F1F5F9;
      color: var(--text-main);
    }
    .nav-tab-btn.active {
      background: var(--brand-primary);
      color: white;
      border-color: var(--brand-primary);
      box-shadow: var(--shadow-md);
    }

    /* 頁面切換內容容器 */
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    /* Control Panel */
    .control-panel {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 16px;
      box-shadow: var(--shadow-md);
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      border: 1px solid var(--border-color);
    }
    .panel-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
    
    input[type="number"], input[type="text"], input[type="date"], input[type="time"], select, textarea {
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      font-size: 0.875rem;
      outline: none;
      transition: all 0.2s;
      background: var(--bg-main);
      color: var(--text-main);
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--brand-primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
      background: #FFF;
    }

    /* Buttons */
    button {
      border: none;
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary { background: var(--brand-primary); color: white; }
    .btn-primary:hover { background: var(--brand-primary-hover); }
    .btn-danger { background: #FEE2E2; color: var(--danger-color); }
    .btn-danger:hover { background: #FCA5A5; color: var(--danger-hover); }
    .btn-secondary { background: #E2E8F0; color: var(--text-main); }
    .btn-secondary:hover { background: #CBD5E1; }
    .btn-success { background: var(--success-color); color: white; }
    .btn-success:hover { background: #059669; }

    /* Total Summary Box */
    .summary-card {
      background: linear-gradient(135deg, #4F46E5 0%, #06B6D4 100%);
      color: white;
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-lg);
    }
    .summary-title { font-size: 0.9rem; font-weight: 500; opacity: 0.9; }
    .summary-amount { font-size: 2.2rem; font-weight: 800; margin: 4px 0 10px 0; }
    .category-breakdown {
      display: none;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }
    .category-breakdown.show { display: grid; }
    .cat-badge {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(4px);
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
    }
    .cat-badge span { font-weight: 700; display: block; font-size: 0.95rem; }

    /* Collapsible Panels */
    .collapsible-panel {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      margin-bottom: 20px;
      border: 1px solid var(--border-color);
      overflow: hidden;
    }
    .panel-header {
      padding: 14px 18px;
      background: #FAF5FF;
      border-bottom: 1px solid #F3E8FF;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .panel-header h3 { font-size: 1.05rem; color: #6B21A8; display: flex; align-items: center; gap: 8px; }
    .toggle-arrow { font-size: 0.8rem; transition: transform 0.3s; color: #6B21A8; }

    /* Flight Grid */
    .flight-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; padding: 16px; }
    .flight-card { background: var(--bg-main); padding: 12px; border-radius: var(--radius-md); border: 1px solid var(--border-color); }
    .flight-card-title { font-weight: 700; font-size: 0.85rem; color: var(--brand-primary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .flight-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    /* Part Sections */
    .part-section {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border-color);
    }
    .part-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border-color);
      gap: 12px;
      flex-wrap: wrap;
    }
    .part-title-input { font-size: 1.25rem; font-weight: 800; color: var(--brand-primary); border: none; background: transparent; width: 100%; max-width: 400px; }
    .part-title-input:focus { background: var(--bg-main); border: 1px solid var(--border-color); }

    /* Day Cards */
    .day-card {
      background: var(--bg-main);
      border-radius: var(--radius-md);
      padding: 14px;
      margin-bottom: 16px;
      border: 1px solid var(--border-color);
    }
    .day-header { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
    .day-input { font-weight: 700; width: 140px; }
    .base-input { font-size: 0.8rem; flex: 1; min-width: 180px; }

    /* Item Card & Summary Bar */
    .item-card {
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-color);
      margin-bottom: 8px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      transition: all 0.2s;
    }
    .item-summary-bar {
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
      background: #FFFFFF;
    }
    .item-summary-bar:hover { background: #F8FAFC; }
    .item-summary-left { display: flex; align-items: center; gap: 8px; flex: 1; overflow: hidden; }
    .item-badge-tag {
      background: #E0E7FF;
      color: #3730A3;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .item-summary-title { font-size: 0.875rem; font-weight: 600; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-summary-right { display: flex; align-items: center; gap: 10px; }
    .item-summary-amount { font-size: 0.875rem; font-weight: 700; color: var(--brand-primary); }
    .expand-arrow { font-size: 0.7rem; color: var(--text-muted); transition: transform 0.2s; }
    
    .item-card.expanded .expand-arrow { transform: rotate(180deg); }
    .item-details-content { display: none; padding: 12px; border-top: 1px dashed var(--border-color); background: #FAF2F7; gap: 10px; flex-direction: column; }
    .item-card.expanded .item-details-content { display: flex; }

    .detail-grid-row { display: grid; grid-template-columns: 140px 1fr; gap: 8px; }
    .cost-box { display: flex; align-items: center; gap: 8px; background: #FFF; padding: 6px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border-color); width: fit-content; }
    .cost-input { width: 90px; text-align: right; font-weight: 600; }
    .curr-tag { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; }

    /* Clearable Input Wrapper */
    .clearable-input-wrapper { position: relative; display: flex; align-items: center; width: 100%; }
    .clearable-input-wrapper input, .clearable-input-wrapper textarea { width: 100%; padding-right: 24px; }
    .clear-btn {
      position: absolute;
      right: 6px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 1rem;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      display: none;
    }
    .clearable-input-wrapper:hover .clear-btn { display: block; }
    .clear-btn:hover { color: var(--danger-color); }

    /* Links Preview Area */
    .note-container { display: flex; flex-direction: column; gap: 4px; width: 100%; }
    .note-preview-area { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .link-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #EFF6FF;
      color: #1D4ED8;
      border: 1px solid #BFDBFE;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s;
    }
    .link-badge:hover { background: #DBEAFE; }

    /* Checklist Section */
    .checklist-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; padding: 16px; }
    .checklist-category-card { background: var(--bg-card); padding: 16px; border-radius: var(--radius-lg); border: 1px solid var(--border-color); box-shadow: var(--shadow-md); margin-bottom: 16px; }
    .checklist-cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
    .checklist-cat-title { font-weight: 700; font-size: 1.05rem; color: var(--text-main); border: none; background: transparent; }
    .checklist-item-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; background: var(--bg-main); padding: 6px 10px; border-radius: var(--radius-sm); }
    .checklist-item-row.checked .checklist-item-input { text-decoration: line-through; color: var(--text-muted); }
    .checklist-item-input { flex: 1; font-size: 0.9rem; border: none; background: transparent; }
    .checklist-item-input:focus { background: white; }

    /* Action Footer Buttons */
    .add-row-btn { width: 100%; padding: 6px; background: #FFF; border: 1px dashed var(--border-color); color: var(--brand-primary); font-weight: 600; border-radius: var(--radius-sm); margin-top: 6px; }
    .add-row-btn:hover { background: #EEF2FF; border-color: var(--brand-primary); }

    /* Responsiveness */
    @media (max-width: 640px) {
      body { padding: 8px; }
      .control-panel { flex-direction: column; align-items: stretch; }
      .detail-grid-row { grid-template-columns: 1fr; }
      .summary-amount { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>✈️ 日本行程與預算規劃</h1>
  <p class="subtitle">即時計算匯率、分區管理行程與行李檢查清單</p>
</header>

<!-- 全域功能大頁籤 Navigation -->
<div class="nav-tabs-wrapper">
  <div class="nav-tabs">
    <button class="nav-tab-btn active" onclick="switchMainTab('itinerary', this)">🗺️ 行程與預算規劃</button>
    <button class="nav-tab-btn" onclick="switchMainTab('checklist', this)">🧳 行李與準備清單</button>
  </div>
</div>

<!-- ================= 頁籤 1: 行程與預算規劃 ================= -->
<div id="tab-itinerary" class="tab-content active">
  <!-- 控制面板 -->
  <div class="control-panel">
    <div class="panel-group">
      <span class="label">💱 匯率 (JPY ➔ TWD):</span>
      <input type="number" id="global-rate" value="0.22" step="0.001" style="width: 80px;" oninput="recalculateAll()">
    </div>
    <div class="panel-group">
      <button class="btn-primary" onclick="toggleAllItems(true)">展開全部細項</button>
      <button class="btn-secondary" onclick="toggleAllItems(false)">折疊全部細項</button>
      <button class="btn-success" onclick="saveDataToFirebase()">☁️ 雲端同步儲存</button>
      <button class="btn-danger" onclick="resetData()">🔄 重整頁面</button>
    </div>
  </div>

  <!-- 預算總覽卡片 -->
  <div class="summary-card">
    <div class="summary-title">預估總支出 (TWD)</div>
    <div class="summary-amount" id="grand-total-twd">NT$ 0</div>
    <button class="btn-secondary" onclick="toggleCategoryBreakdown()" style="background: rgba(255,255,255,0.2); color: white; border: none;">📊 檢視分類花費明細 ▼</button>
    <div class="category-breakdown" id="category-breakdown"></div>
  </div>

  <!-- 航班資訊 (可折疊) -->
  <div class="collapsible-panel">
    <div class="panel-header" onclick="toggleFlightPanel()">
      <h3>✈️ 航班資訊預錄</h3>
      <span class="toggle-arrow" id="flight-toggle-arrow">▼</span>
    </div>
    <div class="flight-grid" id="flight-content-grid">
      <div class="flight-card">
        <div class="flight-card-title">🛫 去程航班 (Taiwan ➔ Japan)</div>
        <div class="flight-inputs">
          <div><label class="label">日期</label><input type="date" id="flight-out-date" style="width:100%"></div>
          <div><label class="label">時間</label><input type="time" id="flight-out-time" style="width:100%"></div>
        </div>
        <div style="margin-top: 8px;"><label class="label">航班編號 / 筆記</label><input type="text" id="flight-out-no" placeholder="例如：JX800" style="width:100%"></div>
      </div>
      <div class="flight-card">
        <div class="flight-card-title">🛬 回程航班 (Japan ➔ Taiwan)</div>
        <div class="flight-inputs">
          <div><label class="label">日期</label><input type="date" id="flight-in-date" style="width:100%"></div>
          <div><label class="label">時間</label><input type="time" id="flight-in-time" style="width:100%"></div>
        </div>
        <div style="margin-top: 8px;"><label class="label">航班編號 / 筆記</label><input type="text" id="flight-in-no" placeholder="例如：JX801" style="width:100%"></div>
      </div>
    </div>
  </div>

  <!-- 行程 PART 區塊容器 (所有 PART 會垂直呈現在此) -->
  <div id="itinerary-container"></div>

  <!-- 新增 PART 按鈕 -->
  <div style="margin-bottom: 24px; text-align: center;">
    <button class="btn-primary" onclick="addPart()" style="padding: 10px 20px; font-size: 0.95rem; border-radius: var(--radius-md);">+ 新增 PART 區塊</button>
  </div>
</div>

<!-- ================= 頁籤 2: 行李與準備清單 ================= -->
<div id="tab-checklist" class="tab-content">
  <div class="control-panel" style="justify-content: flex-end;">
    <button class="btn-success" onclick="saveDataToFirebase()">☁️ 雲端同步儲存</button>
  </div>
  
  <div id="checklist-categories-container"></div>

  <div style="margin-top: 16px; text-align: center;">
    <button class="btn-primary" onclick="addChecklistCategory()" style="padding: 10px 20px; font-size: 0.95rem; border-radius: var(--radius-md);">+ 新增行李分類卡片</button>
  </div>
</div>

<script>
  let tripData = {
    rate: 0.22,
    flight: { outDate: '', outTime: '', outNo: '', inDate: '', inTime: '', inNo: '' },
    parts: {
      part1: {
        title: "PART 1：東京與周邊",
        days: {
          day1: {
            title: "Day 1 抵達東京",
            base: "Base：上野飯店",
            items: {
              item1: { type: "交通", detail: "成田機場 Skyliner 至上野", jpy: 2570, twd: 565, note: "https://www.keisei.co.jp/keisei/tetudou/skyliner/tc/" },
              item2: { type: "飲食", detail: "上野拉麵晚餐", jpy: 1200, twd: 264, note: "" }
            }
          }
        }
      }
    },
    checklist: {
      cat1: {
        title: "重要證件與資金",
        items: {
          item1: { text: "護照 (確認有效期>6個月)", checked: true },
          item2: { text: "日幣現金與信用卡", checked: false },
          item3: { text: "Visit Japan Web QR Code", checked: true }
        }
      }
    }
  };

  const categories = ["固定", "交通", "住宿", "飲食", "遊玩", "購物"];

  /* 切換主頁籤 */
  function switchMainTab(tabName, btn) {
    document.querySelectorAll('.nav-tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

    btn.classList.add('active');
    document.getElementById(`tab-${tabName}`).classList.add('active');
  }

  function getRate() {
    const val = parseFloat(document.getElementById('global-rate').value);
    return isNaN(val) || val <= 0 ? 0.22 : val;
  }

  function toggleCategoryBreakdown() {
    const el = document.getElementById('category-breakdown');
    el.classList.toggle('show');
  }

  function toggleFlightPanel() {
    const grid = document.getElementById('flight-content-grid');
    const arrow = document.getElementById('flight-toggle-arrow');
    if (grid.style.display === 'none') {
      grid.style.display = 'grid';
      arrow.style.transform = 'rotate(180deg)';
    } else {
      grid.style.display = 'none';
      arrow.style.transform = 'rotate(0deg)';
    }
  }

  function toggleItemCard(headerEl) {
    const card = headerEl.closest('.item-card');
    card.classList.toggle('expanded');
  }

  function toggleAllItems(expand) {
    document.querySelectorAll('.item-card').forEach(card => {
      if (expand) {
        card.classList.add('expanded');
      } else {
        card.classList.remove('expanded');
      }
    });
  }

  function wrapClearable(type, className, value, placeholder = '', rows = 1) {
    if (type === 'textarea') {
      return `
        <div class="clearable-input-wrapper">
          <textarea class="${className}" placeholder="${placeholder}" rows="${rows}" oninput="updateItemSummary(this); updateNotePreview(this);">${value || ''}</textarea>
          <button class="clear-btn" onclick="clearInput(this)">×</button>
        </div>
      `;
    } else {
      return `
        <div class="clearable-input-wrapper">
          <input type="${type}" class="${className}" value="${value !== undefined ? value : ''}" placeholder="${placeholder}" oninput="updateItemSummary(this)">
          <button class="clear-btn" onclick="clearInput(this)">×</button>
        </div>
      `;
    }
  }

  function renderCategorySelect(selectedValue) {
    let optionsHtml = `<option value="" disabled ${!selectedValue ? 'selected' : ''}>類別</option>`;
    let isCustom = selectedValue && !categories.includes(selectedValue);

    categories.forEach(cat => {
      const isSelected = (cat === selectedValue) ? 'selected' : '';
      optionsHtml += `<option value="${cat}" ${isSelected}>${cat}</option>`;
    });

    if (isCustom) {
      optionsHtml += `<option value="${selectedValue}" selected>${selectedValue} (自)</option>`;
    }

    return `
      <div style="display: flex; gap: 4px; align-items: center; width: 100%;">
        <select class="cell-input row-type" onchange="updateItemSummary(this); updateGrandTotal()" style="flex: 1; padding-right: 18px;">
          ${optionsHtml}
        </select>
        <button type="button" class="btn-primary" onclick="switchToCustomCategory(this)" title="手動輸入" style="padding: 4px 6px; font-size: 0.75rem; border-radius: 6px; white-space: nowrap;">✏️</button>
      </div>
    `;
  }

  function switchToCustomCategory(btn) {
    const container = btn.closest('div');
    const select = container.querySelector('select');
    const currentVal = select ? select.value : '';
    container.outerHTML = `
      <div style="display: flex; gap: 4px; align-items: center; width: 100%;">
        <div class="clearable-input-wrapper" style="flex: 1;">
          <input type="text" class="cell-input row-type" value="${currentVal}" placeholder="自訂類別" oninput="updateItemSummary(this); updateGrandTotal()">
          <button class="clear-btn" onclick="clearInput(this)">×</button>
        </div>
        <button type="button" class="btn-danger" onclick="switchToSelectCategory(this)" title="切換回選單" style="padding: 4px 6px; font-size: 0.75rem; border-radius: 6px; white-space: nowrap;">📋</button>
      </div>
    `;
    updateGrandTotal();
  }

  function switchToSelectCategory(btn) {
    const container = btn.closest('div');
    const input = container.querySelector('input');
    const currentVal = input ? input.value : '';
    container.outerHTML = renderCategorySelect(currentVal);
    updateGrandTotal();
  }

  function clearInput(btn) {
    const wrapper = btn.closest('.clearable-input-wrapper');
    const input = wrapper.querySelector('input, textarea, select');
    if (input) {
      input.value = '';
      input.dispatchEvent(new Event('input', { bubbles: true }));
    }
  }

  function renderLinkButtons(text) {
    if (!text) return '';
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    let html = '';
    let match;

    if (!urlRegex.test(text)) return ''; 
    urlRegex.lastIndex = 0; 

    while ((match = urlRegex.exec(text)) !== null) {
      const url = match[0];
      let btnText = '🔗 連結';
      if (url.includes('maps.app.goo.gl') || url.includes('google.com/maps')) {
        btnText = '🗺️ 地圖';
      } else if (url.includes('agoda') || url.includes('booking')) {
        btnText = '🏨 訂房';
      } else if (url.includes('klook') || url.includes('kkday')) {
        btnText = '🎫 票券';
      }
      html += `<a href="${url}" target="_blank" rel="noopener noreferrer" class="link-badge">${btnText}</a>`;
    }
    return html;
  }

  function updateItemSummary(inputEl) {
    const card = inputEl.closest('.item-card');
    if (!card) return;
    
    const typeEl = card.querySelector('.row-type');
    const detailEl = card.querySelector('.row-detail');
    const twdEl = card.querySelector('.twd-val');

    const type = typeEl ? (typeEl.value || '未分類') : '未分類';
    const detail = detailEl ? (detailEl.value || '未命名項目') : '未命名項目';
    const twd = twdEl ? (twdEl.value || 0) : 0;

    card.querySelector('.item-badge-tag').innerText = type;
    card.querySelector('.item-summary-title').innerText = detail;
    card.querySelector('.item-summary-amount').innerText = 'NT$ ' + Number(twd).toLocaleString('zh-TW');
  }

  function toggleChecklistRow(checkbox) {
    const row = checkbox.closest('.checklist-item-row');
    if (checkbox.checked) {
      row.classList.add('checked');
    } else {
      row.classList.remove('checked');
    }
  }

  function collectDataFromDOM() {
    const newData = {
      rate: document.getElementById('global-rate').value,
      flight: {
        outDate: document.getElementById('flight-out-date').value,
        outTime: document.getElementById('flight-out-time').value,
        outNo: document.getElementById('flight-out-no').value,
        inDate: document.getElementById('flight-in-date').value,
        inTime: document.getElementById('flight-in-time').value,
        inNo: document.getElementById('flight-in-no').value
      },
      parts: {},
      checklist: {}
    };

    // 收集行程
    document.querySelectorAll('.part-section').forEach((partEl) => {
      const partKey = partEl.dataset.key;
      const partTitle = partEl.querySelector('.part-title-input').value;
      newData.parts[partKey] = { title: partTitle, days: {} };

      partEl.querySelectorAll('.day-card').forEach((dayEl, dIdx) => {
        const dayKey = `day${dIdx + 1}`;
        const dayTitle = dayEl.querySelector('.day-input').value;
        const dayBase = dayEl.querySelector('.base-input').value;
        newData.parts[partKey].days[dayKey] = { title: dayTitle, base: dayBase, items: {} };

        dayEl.querySelectorAll('.item-card').forEach((itemEl, iIdx) => {
          const itemKey = `item${iIdx + 1}`;
          const typeEl = itemEl.querySelector('.row-type');
          const type = typeEl ? typeEl.value : '交通';
          const detail = itemEl.querySelector('.row-detail').value;
          const jpy = parseFloat(itemEl.querySelector('.jpy-val').value) || 0;
          const twd = parseFloat(itemEl.querySelector('.twd-val').value) || 0;
          const note = itemEl.querySelector('.row-note').value;

          newData.parts[partKey].days[dayKey].items[itemKey] = { type, detail, jpy, twd, note };
        });
      });
    });

    // 收集行李清單
    document.querySelectorAll('.checklist-category-card').forEach((catEl, cIdx) => {
      const catKey = `cat${cIdx + 1}`;
      const catTitle = catEl.querySelector('.checklist-cat-title').value;
      newData.checklist[catKey] = { title: catTitle, items: {} };

      catEl.querySelectorAll('.checklist-item-row').forEach((itemEl, iIdx) => {
        const itemKey = `item${iIdx + 1}`;
        const text = itemEl.querySelector('.checklist-item-input').value;
        const checked = itemEl.querySelector('input[type="checkbox"]').checked;
        newData.checklist[catKey].items[itemKey] = { text, checked };
      });
    });

    return newData;
  }

  /* ------------------- 主 UI 渲染 ------------------- */
  function renderUI(data) {
    if (data.rate) {
      document.getElementById('global-rate').value = data.rate;
    }
    if (data.flight) {

      document.getElementById('flight-in-date').value = data.flight.inDate || '';

      `;
      container.appendChild(partDiv);
    });

    // 渲染行李清單
    const checklistContainer = document.getElementById('checklist-categories-container');
    checklistContainer.innerHTML = '';
    const checklist = data.checklist || {};

    Object.keys(checklist).forEach(catKey => {

      const items = cat.items || {};

      Object.keys(items).forEach(itemKey => {

      catDiv.className = 'checklist-category-card';
      catDiv.innerHTML = `
        <div class="checklist-cat-header">
          <div class="clearable-input-wrapper" style="max-width: 65%;">

          </div>
          <button class="btn-danger" onclick="deleteChecklistCategory(this)">刪除分類</button>

          <button class="add-row-btn" onclick="addChecklistItem(this)" style="padding: 4px; font-size: 0.8rem;">+ 新增行李項目</button>
        </div>
      `;
      checklistContainer.appendChild(catDiv);
    });

    updateGrandTotal();
  }

    const listContainer = btn.closest('.checklist-category-card').querySelector('.checklist-items-list');

    row.className = 'checklist-item-row';

    tripData = collectDataFromDOM();

    const newCKey = `cat${cKeys.length + 1}`;
    if (!tripData.checklist) tripData.checklist = {};

  function updateNotePreview(textarea) {

  function jpyInputChanged(input) {
    const card = input.closest('.item-card');
    const jpy = parseFloat(input.value) || 0;
    const twdInput = card.querySelector('.twd-val');
    twdInput.value = Math.round(jpy * getRate());
    updateItemSummary(input);
    updateGrandTotal();
  }

  function twdInputChanged(input) {
    const card = input.closest('.item-card');
    const twd = parseFloat(input.value) || 0;
    const jpyInput = card.querySelector('.jpy-val');
    const rate = getRate();
    if (rate > 0) {
      jpyInput.value = Math.round(twd / rate);
    }
    updateItemSummary(input);
    updateGrandTotal();
  }

  function recalculateAll() {
    const rate = getRate();
    document.querySelectorAll('.item-card').forEach(card => {
      const jpy = parseFloat(card.querySelector('.jpy-val').value) || 0;
      card.querySelector('.twd-val').value = Math.round(jpy * rate);
      updateItemSummary(card.querySelector('.jpy-val'));
    });
    updateGrandTotal();
  }

  function updateGrandTotal() {
    let grandTotal = 0;
    const categoryTotals = {};

    document.querySelectorAll('.item-card').forEach(card => {
      const typeEl = card.querySelector('.row-type');
      let cat = typeEl ? typeEl.value.trim() : '未分類';
      if (!cat) cat = '未分類';

      const twdVal = parseFloat(card.querySelector('.twd-val').value) || 0;
      grandTotal += twdVal;

      if (!categoryTotals[cat]) {
        categoryTotals[cat] = 0;
      }
      categoryTotals[cat] += twdVal;
    });

    document.getElementById('grand-total-twd').innerText = 'NT$ ' + Math.round(grandTotal).toLocaleString('zh-TW');

    const breakdownContainer = document.getElementById('category-breakdown');
    let breakdownHtml = '';

    const sortedCats = Object.keys(categoryTotals).sort((a, b) => {
      const idxA = categories.indexOf(a);
      const idxB = categories.indexOf(b);
      if (idxA !== -1 && idxB !== -1) return idxA - idxB;
      if (idxA !== -1) return -1;
      if (idxB !== -1) return 1;
      return a.localeCompare(b);
    });

    sortedCats.forEach(cat => {
      const amount = categoryTotals[cat];
      if (amount > 0) {
        breakdownHtml += `
          <div class="cat-badge">
            ${cat}: <span>NT$ ${Math.round(amount).toLocaleString('zh-TW')}</span>
          </div>
        `;
      }
    });

    breakdownContainer.innerHTML = breakdownHtml;
  }

            <span style="color:var(--text-muted)">➔</span>
            <div class="input-group"><span class="curr-tag">NT$</span><input type="number" class="cost-input twd-val" value="0" oninput="twdInputChanged(this)"></div>
          </div>
        </div>
        <div>
          <label style="font-size:0.75rem; color:var(--text-muted); font-weight:600;">備註 / 超連結：</label>
          <div class="note-container">

        <div style="text-align: right; margin-top: 4px;">
          <button class="btn-danger" onclick="deleteRow(this)">刪除此項目</button>

<!-- Firebase 即時同步模組 -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBae8XMFtZJiT51DjqqOcfNF2DeNUw9lOc",
    authDomain: "travel-sync-54836.firebaseapp.com",
    databaseURL: "https://travel-sync-54836-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "travel-sync-54836",
    storageBucket: "travel-sync-54836.firebasestorage.app",
    messagingSenderId: "788264955445",
    appId: "1:788264955445:web:d00c5caa0bc6695f264b7c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.saveDataToFirebase = async function() {
    const currentStructuredData = collectDataFromDOM();
    try {
      await set(ref(db, "japan_travel"), currentStructuredData);
      alert("✅ 行程與行李清單已成功同步至雲端！");
    } catch (err) {
      console.error(err);
      alert("❌ 同步失敗：" + err.message);
    }
  };

  function initFirebaseSync() {
    const tripRef = ref(db, "japan_travel");
    let isInitialLoad = true;

    onValue(tripRef, (snapshot) => {
      if (snapshot.exists()) {
        const data = snapshot.val();
        if (data && data.parts) {
          tripData = data;
          renderUI(tripData);
          if (isInitialLoad) {
            console.log("⚡ 已成功從雲端載入結構化資料");
            isInitialLoad = false;
          }
        }
      } else {
        renderUI(tripData);
      }
    });
  }

  initFirebaseSync();
</script>

</body>
</html>
