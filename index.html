<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸☃️日本行程與預算管理☃️🌸</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇯🇵</text></svg>">
  
  <style>
    /* ================= 櫻花粉白系質感與風格設定 ================= */
    :root {
      --bg-color: #fcf6f7;
      --card-bg: #ffffff;
      --text-color: #4a4044;
      --text-muted: #8c7d82;
      --border-color: #f0d5dc;
      --accent-pink: #ff758c;
      --accent-pink-hover: #ff5270;
      --accent-purple: #8b5cf6;
      --accent-green: #2ecc71;
      --danger-color: #ff6b6b;
      --glow-shadow: 0 8px 25px rgba(255, 117, 140, 0.12);
      --card-shadow: 0 4px 15px rgba(220, 195, 202, 0.2);
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 15px;
      line-height: 1.6;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 10px;
    }

    /* 頂部控制面板 (固定置頂) */
    .top-panel {
      position: sticky;
      top: 10px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 15px 20px;
      margin-bottom: 25px;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 8px 30px rgba(255, 117, 140, 0.18);
    }

    .budget-summary-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 280px;
    }

    .budget-summary {
      font-size: 1.25rem;
      font-weight: bold;
      color: #e65c7b;
      letter-spacing: 0.5px;
    }

    /* 動態分類統計小標籤列 */
    .category-breakdown {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .cat-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #fff0f3;
      color: #9c4d63;
      border: 1px solid #ffd1d5;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .cat-badge span {
      color: #e65c7b;
    }

    .control-group {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* 航班資訊面板樣式 */
    .flight-panel {
      background: #ffffff;
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 15px 20px;
      margin-bottom: 25px;
      box-shadow: var(--card-shadow);
    }

    .flight-panel-title {
      font-size: 1.05rem;
      font-weight: bold;
      color: #9c4d63;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 2px solid #ffdbe3;
      padding-bottom: 8px;
    }

    .flight-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .flight-card {
      background: #faf5f6;
      border: 1px solid #f0d5dc;
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .flight-card-header {
      font-weight: bold;
      font-size: 0.9rem;
      color: #b07d89;
    }

    .flight-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr 1.2fr;
      gap: 6px;
    }

    input, button, select, textarea {
      background: #faf5f6;
      color: var(--text-color);
      border: 1px solid var(--border-color);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent-pink);
      box-shadow: 0 0 8px rgba(255, 117, 140, 0.3);
    }

    input[type="number"] {
      width: 85px;
    }

    button {
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .btn-primary { 
      background: linear-gradient(135deg, #ff758c, #ff7eb3); 
      color: white; 
      border: none; 
      box-shadow: 0 4px 10px rgba(255, 117, 140, 0.3);
    }
    .btn-primary:hover { background: linear-gradient(135deg, #ff5270, #ff639c); }

    .btn-danger { 
      background: #fff0f1; 
      color: var(--danger-color); 
      border: 1px solid #ffd1d5; 
      padding: 4px 10px;
      font-size: 0.8rem;
      border-radius: 6px;
    }
    .btn-danger:hover { background: var(--danger-color); color: white; }

    .btn-success { 
      background: linear-gradient(135deg, #2ecc71, #27ae60); 
      color: white; 
      border: none; 
      box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
    }
    .btn-success:hover { background: linear-gradient(135deg, #27ae60, #1e8449); }

    /* 內建清除按鈕包裝容器 */
    .clearable-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
    }

    .clearable-input-wrapper input,
    .clearable-input-wrapper textarea,
    .clearable-input-wrapper select {
      width: 100%;
      padding-right: 28px;
    }

    .clear-btn {
      position: absolute;
      right: 8px;
      background: #e2d1d6;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0.6;
      transition: all 0.2s;
      padding: 0;
      line-height: 1;
      z-index: 10;
    }

    .clear-btn:hover {
      opacity: 1;
      background: var(--danger-color);
      transform: scale(1.1);
    }

    /* 表格欄位寬度配置：縮短類別，拉長細項 */
    th.col-type, td.col-type { width: 110px; min-width: 110px; }
    th.col-detail, td.col-detail { width: auto; }

    /* PART 區塊樣式 */
    .part-section {
      background: #ffffff;
      border: 2px dashed #f0d5dc;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: var(--card-shadow);
    }

    .part-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      border-bottom: 2px solid #ffdbe3;
      padding-bottom: 12px;
      gap: 10px;
    }

    .part-title-input {
      font-size: 1.2rem;
      font-weight: bold;
      color: #9c4d63;
      border: 1px solid transparent;
      background: transparent;
      width: 60%;
    }
    .part-title-input:focus {
      background: #faf5f6;
      border-color: var(--accent-pink);
    }

    .part-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    /* Day 卡片樣式 */
    .day-card {
      background: #faf5f6;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      margin-bottom: 15px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(220, 195, 202, 0.15);
    }

    .day-header {
      background: linear-gradient(to right, #ffeef2, #faf5f6);
      padding: 12px 15px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 6px solid var(--accent-pink);
      border-bottom: 1px solid var(--border-color);
      gap: 10px;
      flex-wrap: wrap;
    }

    .day-input {
      background: transparent;
      border: 1px solid transparent;
      font-weight: bold;
      color: var(--text-color);
      font-size: 1rem;
      flex: 1;
      min-width: 180px;
    }
    .day-input:focus {
      background: white;
      border-color: var(--accent-pink);
    }

    .base-input {
      background: #ffffff;
      border: 1px solid #ffdbe3;
      font-size: 0.85rem;
      color: #9c6c77;
      padding: 4px 8px;
      border-radius: 6px;
      width: 140px;
    }

    /* 表格樣式 */
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid #f0d5dc;
      font-size: 0.9rem;
    }

    th {
      background: #f4eaed;
      color: var(--text-muted);
      font-weight: 600;
    }

    /* 表格欄位輸入框 */
    .cell-input {
      background: #ffffff;
      border: 1px solid var(--border-color);
      width: 100%;
      padding: 6px;
      border-radius: 6px;
      color: var(--text-color);
    }
    .cell-input:focus {
      border-color: var(--accent-pink);
    }

    select.cell-input {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238c7d82' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 6px center;
      background-size: 12px;
      padding-right: 22px;
      font-size: 0.85rem;
    }

    /* 備註與超連結包裝區塊 */
    .note-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .note-preview-area {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .link-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #fff0f3;
      color: #e65c7b;
      border: 1px solid #ffd1d5;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 0.8rem;
      text-decoration: none;
      font-weight: 600;
      width: fit-content;
      transition: all 0.2s;
    }

    .link-badge:hover {
      background: #ffe0e6;
      border-color: var(--accent-pink);
      transform: translateY(-1px);
    }

    /* 費用輸入群組 */
    .cost-box {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .input-group {
      display: flex;
      align-items: center;
      background: #ffffff;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      overflow: hidden;
    }

    .curr-tag {
      padding: 4px 6px;
      font-size: 0.8rem;
      background: #f0e1e5;
      color: #7a686e;
    }

    .cost-input {
      border: none;
      background: transparent;
      padding: 4px;
      width: 70px;
      color: var(--text-color);
    }

    .twd-val {
      color: #e0566d;
      font-weight: bold;
    }

    .del-row-btn {
      background: #fff0f1;
      color: var(--danger-color);
      border: 1px solid #ffd1d5;
      padding: 4px 10px;
      font-size: 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .del-row-btn:hover {
      background: var(--danger-color);
      color: white;
    }

    .add-row-container {
      padding: 10px;
      text-align: center;
      background: #ffffff;
    }

    .add-row-btn, .add-day-btn, .add-part-btn {
      background: #faf5f6;
      border: 1px dashed #e6b8c3;
      color: #b07d89;
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    .add-row-btn:hover, .add-day-btn:hover, .add-part-btn:hover {
      background: #fff0f3;
      border-color: var(--accent-pink);
      color: var(--accent-pink);
    }

    .global-actions {
      text-align: center;
      margin: 25px 0;
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* 響應式手機優化 */
    @media (max-width: 768px) {
      .top-panel { flex-direction: column; align-items: stretch; padding: 12px 15px; }
      .control-group { justify-content: space-between; }
      .flight-grid { grid-template-columns: 1fr; }
      
      .part-header {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }
      .part-header .clearable-input-wrapper {
        width: 100%;
      }
      .part-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      table, thead, tbody, th, td, tr { display: block; width: 100%; box-sizing: border-box; }
      thead { display: none; }
      tr {
        margin-bottom: 12px;
        border: 1px solid var(--border-color);
        border-radius: 10px;
        background: #ffffff;
        padding: 10px;
      }
      td { 
        border: none; 
        padding: 6px 0; 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
      }
      td::before { 
        content: attr(data-label); 
        color: var(--text-muted); 
        font-weight: 600; 
        min-width: 80px;
        flex-shrink: 0;
      }
      .col-type, .col-detail, .cell-input { width: 100% !important; min-width: 100% !important; }
      .cost-box { width: calc(100% - 90px); justify-content: flex-end; }
      .note-container { width: calc(100% - 90px); }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- 頂部控制面板 -->
  <div class="top-panel">
    <div class="budget-summary-container">
      <div class="budget-summary">
        🌸 總預算估算：<span id="grand-total-twd">NT$ 0</span>
      </div>
      <div id="category-breakdown" class="category-breakdown"></div>
    </div>
    <div class="control-group">
      <label style="font-size: 0.9rem; font-weight: 600;">匯率 (JPY➔TWD):</label>
      <div class="clearable-input-wrapper" style="width: 100px;">
        <input type="number" id="global-rate" value="0.22" step="0.01" oninput="recalculateAll()">
        <button class="clear-btn" onclick="clearInput(this)">×</button>
      </div>
      <button class="btn-success" onclick="saveDataToFirebase()">☁️ 同步雲端</button>
      <button class="btn-danger" onclick="resetData()">重置</button>
    </div>
  </div>

  <!-- 航班與出國資訊面板 -->
  <div class="flight-panel">
    <div class="flight-panel-title">✈️ 航班與出國資訊</div>
    <div class="flight-grid">
      <!-- 去程航班 -->
      <div class="flight-card">
        <div class="flight-card-header">🛫 去程航班 (Departure)</div>
        <div class="flight-inputs">
          <div class="clearable-input-wrapper"><input type="date" id="flight-out-date" placeholder="日期 12/01" /></div>
          <div class="clearable-input-wrapper"><input type="time" id="flight-out-time" placeholder="時間 08:30" /></div>
          <div class="clearable-input-wrapper"><input type="text" id="flight-out-no" placeholder="班機 JX820" /></div>
        </div>
      </div>
      <!-- 回程航班 -->
      <div class="flight-card">
        <div class="flight-card-header">🛬 回程航班 (Return)</div>
        <div class="flight-inputs">
          <div class="clearable-input-wrapper"><input type="date" id="flight-in-date" placeholder="日期 12/05" /></div>
          <div class="clearable-input-wrapper"><input type="time" id="flight-in-time" placeholder="時間 15:45" /></div>
          <div class="clearable-input-wrapper"><input type="text" id="flight-in-no" placeholder="班機 JX821" /></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 行程容器 -->
  <div id="itinerary-container"></div>

  <!-- 全域新增按鈕 -->
  <div class="global-actions">
    <button class="btn-primary add-part-btn" onclick="addPart()" style="padding: 10px 20px; border-radius: 10px; width: auto;">➕ 新增區塊 (PART)</button>
  </div>

</div>

<script>
  let tripData = {
    rate: 0.22,
    flight: {
      outDate: "12/01", outTime: "08:30", outNo: "JX820",
      inDate: "12/05", inTime: "15:45", inNo: "JX821"
    },
    parts: {
      part1: {
        title: "PART 1：北海道極光與玩雪篇",
        days: {
          day1: {
            title: "Day 1 抵達與市區漫步",
            base: "札幌車站周邊",
            items: {
              item1: { type: "交通", detail: "機場快線車票", jpy: 1150, twd: 253, note: "https://maps.app.goo.gl/example\nhttps://www.booking.com/example" }
            }
          }
        }
      }
    }
  };

  const categories = ["固定", "交通", "住宿", "飲食", "遊玩", "購物"];

  function getRate() {
    const val = parseFloat(document.getElementById('global-rate').value);
    return isNaN(val) || val <= 0 ? 0.22 : val;
  }

  function wrapClearable(type, className, value, placeholder = '', rows = 1) {
    if (type === 'textarea') {
      return `
        <div class="clearable-input-wrapper">
          <textarea class="${className}" placeholder="${placeholder}" rows="${rows}" oninput="updateNotePreview(this);">${value || ''}</textarea>
          <button class="clear-btn" onclick="clearInput(this)">×</button>
        </div>
      `;
    } else {
      return `
        <div class="clearable-input-wrapper">
          <input type="${type}" class="${className}" value="${value !== undefined ? value : ''}" placeholder="${placeholder}">
          <button class="clear-btn" onclick="clearInput(this)">×</button>
        </div>
      `;
    }
  }

  // 類別專用：產生下拉選單 (精簡寬度設計)
  function renderCategorySelect(selectedValue) {
    let optionsHtml = `<option value="" disabled ${!selectedValue ? 'selected' : ''}>類別</option>`;
    let isCustom = selectedValue && !categories.includes(selectedValue);

    categories.forEach(cat => {
      const isSelected = (cat === selectedValue) ? 'selected' : '';
      optionsHtml += `<option value="${cat}" ${isSelected}>${cat}</option>`;
    });

    if (isCustom) {
      optionsHtml += `<option value="${selectedValue}" selected>${selectedValue} (自)</option>`;
    }

    return `
      <div style="display: flex; gap: 3px; align-items: center; width: 100%;">
        <select class="cell-input row-type" onchange="updateGrandTotal()" style="flex: 1; padding-right: 18px;">
          ${optionsHtml}
        </select>
        <button type="button" class="btn-primary" onclick="switchToCustomCategory(this)" title="手動輸入" style="padding: 6px 6px; font-size: 0.75rem; border-radius: 6px; white-space: nowrap;">✏️</button>
      </div>
    `;
  }

  function switchToCustomCategory(btn) {
    const td = btn.closest('td');
    const currentVal = td.querySelector('select, input')?.value || '';
    td.innerHTML = `
      <div style="display: flex; gap: 3px; align-items: center; width: 100%;">
        <div class="clearable-input-wrapper" style="flex: 1;">
          <input type="text" class="cell-input row-type" value="${currentVal}" placeholder="自訂類別" oninput="updateGrandTotal()">
          <button class="clear-btn" onclick="clearInput(this)">×</button>
        </div>
        <button type="button" class="btn-danger" onclick="switchToSelectCategory(this)" title="切換回選單" style="padding: 4px 6px; font-size: 0.75rem; border-radius: 6px; white-space: nowrap;">📋</button>
      </div>
    `;
    updateGrandTotal();
  }

  function switchToSelectCategory(btn) {
    const td = btn.closest('td');
    const input = td.querySelector('input');
    const currentVal = input ? input.value : '';
    td.innerHTML = renderCategorySelect(currentVal);
    updateGrandTotal();
  }

  function clearInput(btn) {
    const wrapper = btn.closest('.clearable-input-wrapper');
    const input = wrapper.querySelector('input, textarea');
    if (input) {
      input.value = '';
      input.dispatchEvent(new Event('input', { bubbles: true }));
    }
  }

  function renderLinkButtons(text) {
    if (!text) return '';
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    let html = '';
    let match;

    if (!urlRegex.test(text)) {
      return ''; 
    }
    urlRegex.lastIndex = 0; 

    while ((match = urlRegex.exec(text)) !== null) {
      const url = match[0];
      let btnText = '🔗 連結';
      if (url.includes('maps.app.goo.gl') || url.includes('google.com/maps')) {
        btnText = '🗺️ 地圖';
      } else if (url.includes('agoda') || url.includes('booking')) {
        btnText = '🏨 訂房';
      } else if (url.includes('klook') || url.includes('kkday')) {
        btnText = '🎫 票券';
      }
      html += `<a href="${url}" target="_blank" rel="noopener noreferrer" class="link-badge">${btnText}</a>`;
    }
    return html;
  }

  function collectDataFromDOM() {
    const newData = {
      rate: document.getElementById('global-rate').value,
      flight: {
        outDate: document.getElementById('flight-out-date').value,
        outTime: document.getElementById('flight-out-time').value,
        outNo: document.getElementById('flight-out-no').value,
        inDate: document.getElementById('flight-in-date').value,
        inTime: document.getElementById('flight-in-time').value,
        inNo: document.getElementById('flight-in-no').value
      },
      parts: {}
    };

    document.querySelectorAll('.part-section').forEach((partEl, pIdx) => {
      const partKey = `part${pIdx + 1}`;
      const partTitle = partEl.querySelector('.part-title-input').value;
      newData.parts[partKey] = { title: partTitle, days: {} };

      partEl.querySelectorAll('.day-card').forEach((dayEl, dIdx) => {
        const dayKey = `day${dIdx + 1}`;
        const dayTitle = dayEl.querySelector('.day-input').value;
        const dayBase = dayEl.querySelector('.base-input').value;
        newData.parts[partKey].days[dayKey] = { title: dayTitle, base: dayBase, items: {} };

        dayEl.querySelectorAll('tbody tr').forEach((rowEl, iIdx) => {
          const itemKey = `item${iIdx + 1}`;
          const typeEl = rowEl.querySelector('.row-type');
          const type = typeEl ? typeEl.value : '交通';
          const detail = rowEl.querySelector('.row-detail').value;
          const jpy = parseFloat(rowEl.querySelector('.jpy-val').value) || 0;
          const twd = parseFloat(rowEl.querySelector('.twd-val').value) || 0;
          const note = rowEl.querySelector('.row-note').value;

          newData.parts[partKey].days[dayKey].items[itemKey] = { type, detail, jpy, twd, note };
        });
      });
    });

    return newData;
  }

  function renderUI(data) {
    if (data.rate) {
      document.getElementById('global-rate').value = data.rate;
    }
    if (data.flight) {
      document.getElementById('flight-out-date').value = data.flight.outDate || '';
      document.getElementById('flight-out-time').value = data.flight.outTime || '';
      document.getElementById('flight-out-no').value = data.flight.outNo || '';
      document.getElementById('flight-in-date').value = data.flight.inDate || '';
      document.getElementById('flight-in-time').value = data.flight.inTime || '';
      document.getElementById('flight-in-no').value = data.flight.inNo || '';
    }

    const container = document.getElementById('itinerary-container');
    container.innerHTML = '';

    const parts = data.parts || {};
    Object.keys(parts).forEach(partKey => {
      const part = parts[partKey];
      const partDiv = document.createElement('div');
      partDiv.className = 'part-section';
      partDiv.dataset.key = partKey;

      let daysHtml = '';
      const days = part.days || {};
      Object.keys(days).forEach(dayKey => {
        const day = days[dayKey];
        
        let itemsHtml = '';
        const items = day.items || {};
        Object.keys(items).forEach(itemKey => {
          const item = items[itemKey];
          const twd = item.twd !== undefined ? item.twd : Math.round((item.jpy || 0) * getRate());
          const rawNote = item.note || '';
          const linkHtml = renderLinkButtons(rawNote);

          itemsHtml += `
            <tr>
              <td class="col-type" data-label="類別">${renderCategorySelect(item.type || '交通')}</td>
              <td class="col-detail" data-label="費用細項">${wrapClearable('text', 'cell-input row-detail', item.detail || '', '細項 / 規劃')}</td>
              <td data-label="預估花費">
                <div class="cost-box">
                  <div class="input-group"><span class="curr-tag">JPY</span><input type="number" class="cost-input jpy-val" value="${item.jpy || 0}" oninput="jpyInputChanged(this)"></div>
                  <span style="color:var(--text-muted)">➔</span>
                  <div class="input-group"><span class="curr-tag">NT$</span><input type="number" class="cost-input twd-val" value="${twd}" oninput="twdInputChanged(this)"></div>
                </div>
              </td>
              <td data-label="備註/超連結">
                <div class="note-container">
                  ${wrapClearable('textarea', 'cell-input row-note', rawNote, '說明或貼上網址', 2)}
                  <div class="note-preview-area">${linkHtml}</div>
                </div>
              </td>
              <td style="text-align: center;" data-label="操作"><button class="del-row-btn" onclick="deleteRow(this)">刪除</button></td>
            </tr>
          `;
        });

        daysHtml += `
          <div class="day-card" data-key="${dayKey}">
            <div class="day-header">
              ${wrapClearable('text', 'day-input', day.title || '', 'Day 名稱')}
              ${wrapClearable('text', 'base-input', day.base || '', 'Base：住宿地點')}
              <button class="btn-danger" onclick="deleteDay(this)">刪除此日</button>
            </div>
            <table>
              <thead>
                <tr><th class="col-type">類別</th><th class="col-detail">費用細項 / 規劃</th><th>預估花費 (日幣 ⇄ 台幣)</th><th>備註 / 說明 (含自動網址)</th><th style="width: 60px;"></th></tr>
              </thead>
              <tbody>${itemsHtml}</tbody>
            </table>
            <div class="add-row-container"><button class="add-row-btn" onclick="addRow(this)">+ 新增此日行程</button></div>
          </div>
        `;
      });

      partDiv.innerHTML = `
        <div class="part-header">
          ${wrapClearable('text', 'part-title-input', part.title || '', '分區標題')}
          <div class="part-actions">
            <button onclick="addDay(this)" class="btn-primary" style="padding: 6px 12px; font-size: 0.85rem; border-radius: 6px;">+ 新增天數</button>
            <button onclick="deletePart(this)" class="btn-danger">刪除區塊</button>
          </div>
        </div>
        <div class="days-container">${daysHtml}</div>
      `;
      container.appendChild(partDiv);
    });

    updateGrandTotal();
  }

  function updateNotePreview(textarea) {
    const container = textarea.closest('.note-container');
    const previewArea = container.querySelector('.note-preview-area');
    previewArea.innerHTML = renderLinkButtons(textarea.value);
  }

  function jpyInputChanged(input) {
    const row = input.closest('tr');
    const jpy = parseFloat(input.value) || 0;
    const twdInput = row.querySelector('.twd-val');
    twdInput.value = Math.round(jpy * getRate());
    updateGrandTotal();
  }

  function twdInputChanged(input) {
    const row = input.closest('tr');
    const twd = parseFloat(input.value) || 0;
    const jpyInput = row.querySelector('.jpy-val');
    const rate = getRate();
    if (rate > 0) {
      jpyInput.value = Math.round(twd / rate);
    }
    updateGrandTotal();
  }

  function recalculateAll() {
    const rate = getRate();
    document.querySelectorAll('tbody tr').forEach(row => {
      const jpy = parseFloat(row.querySelector('.jpy-val').value) || 0;
      row.querySelector('.twd-val').value = Math.round(jpy * rate);
    });
    updateGrandTotal();
  }

  function updateGrandTotal() {
    let grandTotal = 0;
    const categoryTotals = {};

    document.querySelectorAll('tbody tr').forEach(row => {
      const typeEl = row.querySelector('.row-type');
      let cat = typeEl ? typeEl.value.trim() : '未分類';
      if (!cat) cat = '未分類';

      const twdVal = parseFloat(row.querySelector('.twd-val').value) || 0;
      grandTotal += twdVal;

      if (!categoryTotals[cat]) {
        categoryTotals[cat] = 0;
      }
      categoryTotals[cat] += twdVal;
    });

    document.getElementById('grand-total-twd').innerText = 'NT$ ' + Math.round(grandTotal).toLocaleString('zh-TW');

    const breakdownContainer = document.getElementById('category-breakdown');
    let breakdownHtml = '';

    const sortedCats = Object.keys(categoryTotals).sort((a, b) => {
      const idxA = categories.indexOf(a);
      const idxB = categories.indexOf(b);
      if (idxA !== -1 && idxB !== -1) return idxA - idxB;
      if (idxA !== -1) return -1;
      if (idxB !== -1) return 1;
      return a.localeCompare(b);
    });

    sortedCats.forEach(cat => {
      const amount = categoryTotals[cat];
      if (amount > 0) {
        breakdownHtml += `
          <div class="cat-badge">
            ${cat}: <span>NT$ ${Math.round(amount).toLocaleString('zh-TW')}</span>
          </div>
        `;
      }
    });

    breakdownContainer.innerHTML = breakdownHtml;
  }

  function deleteRow(btn) {
    btn.closest('tr').remove();
    updateGrandTotal();
  }

  function addRow(btn) {
    const tbody = btn.closest('.day-card').querySelector('tbody');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="col-type" data-label="類別">${renderCategorySelect('交通')}</td>
      <td class="col-detail" data-label="費用細項">${wrapClearable('text', 'cell-input row-detail', '新項目', '細項 / 規劃')}</td>
      <td data-label="預估花費">
        <div class="cost-box">
          <div class="input-group"><span class="curr-tag">JPY</span><input type="number" class="cost-input jpy-val" value="0" oninput="jpyInputChanged(this)"></div>
          <span style="color:var(--text-muted)">➔</span>
          <div class="input-group"><span class="curr-tag">NT$</span><input type="number" class="cost-input twd-val" value="0" oninput="twdInputChanged(this)"></div>
        </div>
      </td>
      <td data-label="備註/超連結">
        <div class="note-container">
          ${wrapClearable('textarea', 'cell-input row-note', '', '說明或貼上網址', 2)}
          <div class="note-preview-area"></div>
        </div>
      </td>
      <td style="text-align: center;" data-label="操作"><button class="del-row-btn" onclick="deleteRow(this)">刪除</button></td>
    `;
    tbody.appendChild(tr);
    updateGrandTotal();
  }

  function deleteDay(btn) {
    btn.closest('.day-card').remove();
    updateGrandTotal();
  }

  function addDay(btn) {
    const partSection = btn.closest('.part-section');
    const daysContainer = partSection.querySelector('.days-container');
    const dayDiv = document.createElement('div');
    dayDiv.className = 'day-card';
    dayDiv.innerHTML = `
      <div class="day-header">
        ${wrapClearable('text', 'day-input', 'Day X 新的一天', 'Day 名稱')}
        ${wrapClearable('text', 'base-input', '住宿地點', 'Base：住宿地點')}
        <button class="btn-danger" onclick="deleteDay(this)">刪除此日</button>
      </div>
      <table>
        <thead>
          <tr><th class="col-type">類別</th><th class="col-detail">費用細項 / 規劃</th><th>預估花費 (日幣 ⇄ 台幣)</th><th>備註 / 說明 (含自動網址)</th><th style="width: 60px;"></th></tr>
        </thead>
        <tbody>
          <tr>
            <td class="col-type" data-label="類別">${renderCategorySelect('交通')}</td>
            <td class="col-detail" data-label="費用細項">${wrapClearable('text', 'cell-input row-detail', '新項目', '細項 / 規劃')}</td>
            <td data-label="預估花費">
              <div class="cost-box">
                <div class="input-group"><span class="curr-tag">JPY</span><input type="number" class="cost-input jpy-val" value="0" oninput="jpyInputChanged(this)"></div>
                <span style="color:var(--text-muted)">➔</span>
                <div class="input-group"><span class="curr-tag">NT$</span><input type="number" class="cost-input twd-val" value="0" oninput="twdInputChanged(this)"></div>
              </div>
            </td>
            <td data-label="備註/超連結">
              <div class="note-container">
                ${wrapClearable('textarea', 'cell-input row-note', '', '說明或貼上網址', 2)}
                <div class="note-preview-area"></div>
              </div>
            </td>
            <td style="text-align: center;" data-label="操作"><button class="del-row-btn" onclick="deleteRow(this)">刪除</button></td>
          </tr>
        </tbody>
      </table>
      <div class="add-row-container"><button class="add-row-btn" onclick="addRow(this)">+ 新增此日行程</button></div>
    `;
    daysContainer.appendChild(dayDiv);
    updateGrandTotal();
  }

  function addPart() {
    tripData = collectDataFromDOM();
    const pKeys = Object.keys(tripData.parts);
    const newPKey = `part${pKeys.length + 1}`;
    tripData.parts[newPKey] = {
      title: `PART ${pKeys.length + 1}：新篇章`,
      days: {
        day1: { title: "Day 1", base: "住宿地點", items: { item1: { type: "交通", detail: "項目", jpy: 0, twd: 0, note: "" } } }
      }
    };
    renderUI(tripData);
  }

  function deletePart(btn) {
    if (confirm('確定要刪除整個 PART 區塊嗎？')) {
      btn.closest('.part-section').remove();
      updateGrandTotal();
    }
  }

  function resetData() {
    if (confirm('確定要重整頁面嗎？未儲存的變更將會遺失。')) {
      location.reload();
    }
  }
</script>

<!-- Firebase 即時同步模組 -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBae8XMFtZJiT51DjqqOcfNF2DeNUw9lOc",
    authDomain: "travel-sync-54836.firebaseapp.com",
    databaseURL: "https://travel-sync-54836-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "travel-sync-54836",
    storageBucket: "travel-sync-54836.firebasestorage.app",
    messagingSenderId: "788264955445",
    appId: "1:788264955445:web:d00c5caa0bc6695f264b7c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.saveDataToFirebase = async function() {
    const currentStructuredData = collectDataFromDOM();
    try {
      await set(ref(db, "japan_travel"), currentStructuredData);
      alert("✅ 航班與行程結構化資料已成功同步至雲端！");
    } catch (err) {
      console.error(err);
      alert("❌ 同步失敗：" + err.message);
    }
  };

  function initFirebaseSync() {
    const tripRef = ref(db, "japan_travel");
    let isInitialLoad = true;

    onValue(tripRef, (snapshot) => {
      if (snapshot.exists()) {
        const data = snapshot.val();
        if (data && data.parts) {
          tripData = data;
          renderUI(tripData);
          if (isInitialLoad) {
            console.log("⚡ 已成功從雲端載入結構化資料");
            isInitialLoad = false;
          }
        }
      } else {
        renderUI(tripData);
      }
    });
  }

  initFirebaseSync();
</script>
